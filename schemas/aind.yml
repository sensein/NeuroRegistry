    class_uri: https://aind-data-schema.readthedocs.io/en/stable/#Acquisition
    description: 'Description of data acquisition metadata including streams, stimuli,
      and experimental setup.


      The acquisition metadata is split into two parallel pieces: the DataStream and
      the StimulusEpoch.

      At any given moment in time the active DataStream(s) represents all modalities
      of data being acquired,

      while the StimulusEpoch represents all stimuli being presented.'
    slots:
    - Acquisition__object_type
    - Acquisition__describedBy
    - Acquisition__schema_version
    - Acquisition__protocol_id
    - Acquisition__subject_id
    - Acquisition__specimen_id
    - Acquisition__acquisition_start_time
