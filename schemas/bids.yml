  ElectrodeManufacturer:
    description: 'Can be used if all electrodes are of the same manufacturer

      (for example, `"AD-TECH"`, `"DIXI"`).

      If electrodes of different manufacturers are used,

      please use the corresponding table in the `_electrodes.tsv` file.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeManufacturer
  ElectrodeManufacturersModelName:
    description: 'If different electrode types are used,

      please use the corresponding table in the `_electrodes.tsv` file.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeManufacturersModelName
  ElectrodeMaterial:
    description: 'Material of the electrode (for example, `Tin`, `Ag/AgCl`, `Gold`).

