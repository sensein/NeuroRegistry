      Indicate `n/a` in the absence of software filters applied.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#software_filters
  columns__source__channels:
    description: 'Name of the source as specified in the `*_optodes.tsv` file.

      `n/a` for channels that do not contain fNIRS signals (for example, acceleration).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#source__channels
  columns__source__optodes:
    description: The type of source. Only to be used if the field `SourceType` in
      `*_nirs.json` is set to `mixed`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#source__optodes
  columns__species:
    description: 'The `species` column SHOULD be a binomial species name from the

      [NCBI Taxonomy](https://www.ncbi.nlm.nih.gov/Taxonomy/Browser/wwwtax.cgi)

      (for example, `homo sapiens`, `mus musculus`, `rattus norvegicus`).

      For backwards compatibility, if `species` is absent, the participant is assumed
      to be

      `homo sapiens`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#species
  columns__status:
    description: 'Data quality observed on the channel.

      A channel is considered `bad` if its data quality is compromised by excessive
      noise.

      If quality is unknown, then a value of `n/a` may be used.

      Description of noise type SHOULD be provided in `[status_description]`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#status
  columns__status_description:
    description: 'Freeform text description of noise or artifact affecting data quality
      on the channel.

      It is meant to explain why the channel was declared bad in the `status` column.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#status_description
  columns__stim_file:
    description: 'Represents the location of the stimulus file (such as an image,
      video, or

      audio file) presented at the given onset time.

      There are no restrictions on the file formats of the stimuli files,

      but they should be stored in the `/stimuli/` directory

      (under the root directory of the dataset; with optional subdirectories).

      The values under the `stim_file` column correspond to a path relative to

      `/stimuli`.

      For example `images/cat03.jpg` will be translated to `/stimuli/images/cat03.jpg`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#stim_file
  columns__strain:
    description: 'For species different from `homo sapiens`, string value indicating

      the strain of the species, for example: `C57BL/6J`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#strain
  columns__strain_rrid:
    description: 'For species different from `homo sapiens`, research resource identifier

      ([RRID](https://rrid.site/data/source/nlx_154697-1/search))

      of the strain of the species, for example: `RRID:IMSR_JAX:000664`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#strain_rrid
  columns__target_muscle:
    description: 'Name of the muscle(s) from which the EMG signal in this channel
      is believed to originate.

      When exact muscle is unknown (such as when using electrode grids that cover
      multiple muscles),

      groups of muscles may be named instead (for example "flexors of the left forearm").'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#target_muscle
  columns__template_x:
    description: Assumed or ideal position along the x axis.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template_x
  columns__template_y:
