    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReconMethodParameterLabels
  ReconMethodParameterUnits:
    description: 'Unit of reconstruction parameters (for example, `["none", "none"]`).

      This partly matches the [DICOM Tag 0054, 1103](http://www.dicomlookup.com/dicomtags/(0054,1103))

      `Reconstruction Method`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReconMethodParameterUnits
  ReconMethodParameterValues:
    description: 'Values of reconstruction parameters (for example, `[21, 3]`).

      This partly matches the [DICOM Tag 0054, 1103](http://www.dicomlookup.com/dicomtags/(0054,1103))

      `Reconstruction Method`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReconMethodParameterValues
  RecordedEye:
    description: 'Indicates the eye being tracked, for example, `"left"` or `"right"`.

      It SHOULD be set to `"cyclopean"` for recordings combining both eyes

      as potentially generated by binocular eye-trackers.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RecordedEye
  RecordingDuration:
    description: 'Length of the recording in seconds (for example, `3600`).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RecordingDuration
  RecordingType:
    description: 'Defines whether the recording is `"continuous"`, `"discontinuous"`,
      or

      `"epoched"`, where `"epoched"` is limited to time windows about events of

      interest (for example, stimulus presentations or subject responses).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RecordingType
  ReferenceSignal:
    description: 'The path(s) to the MRS reference file(s), if present, to which the
      associated

      MRS data file corresponds.

      Contains one or more [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReferenceSignal
  ReferencesAndLinks:
    description: 'List of references to publications that contain information on the
      dataset.

      A reference may be textual or a

      [URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator).

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReferencesAndLinks
  RepetitionTime:
    description: 'The time in seconds between the beginning of an acquisition of one
      volume

      and the beginning of acquisition of the volume following it (TR).

      When used in the context of functional acquisitions this parameter best

      corresponds to

      [DICOM Tag 0020, 0110](http://www.dicomlookup.com/dicomtags/(0020,0110)):

      the "time delta between images in a

      dynamic of functional set of images" but may also be found in

      [DICOM Tag 0018, 0080](http://www.dicomlookup.com/dicomtags/(0018,0080)):

      "the period of time in msec between the beginning

      of a pulse sequence and the beginning of the succeeding

      (essentially identical) pulse sequence".

      This definition includes time between scans (when no data has been acquired)

      in case of sparse acquisition schemes.

      This value MUST be consistent with the ''pixdim[4]'' field (after accounting

      for units stored in ''xyzt_units'' field) in the NIfTI header.

      This field is mutually exclusive with VolumeTiming.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RepetitionTime
  RepetitionTimeExcitation:
    description: 'The interval, in seconds, between two successive excitations.

      [DICOM Tag 0018, 0080](http://www.dicomlookup.com/dicomtags/(0018,0080))

      best refers to this parameter.

      This field may be used together with the `"RepetitionTimePreparation"` for

      certain use cases, such as

      [MP2RAGE](https://doi.org/10.1016/j.neuroimage.2009.10.002).

      Use `RepetitionTimeExcitation` (in combination with

      `"RepetitionTimePreparation"` if needed) for anatomy imaging data rather than

      `"RepetitionTime"` as it is already defined as the amount of time that it takes

      to acquire a single volume in the

      [task imaging data](SPEC_ROOT/modality-specific-files/magnetic-resonance-\

      imaging-data.md#task-including-resting-state-imaging-data)

      section.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RepetitionTimeExcitation
  RepetitionTimePreparation:
    description: 'The interval, in seconds, that it takes a preparation pulse block
      to

      re-appear at the beginning of the succeeding (essentially identical) pulse

      sequence block.

      The data type number may apply to files from any MRI modality concerned with

      a single value for this field.

      The data type array provides a value for each volume in a 4D dataset and

      should only be used when the volume timing is critical for interpretation of

      the data, such as in

      [ASL](SPEC_ROOT/modality-specific-files/magnetic-resonance-imaging-data.md\

      #arterial-spin-labeling-perfusion-data).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RepetitionTimePreparation
  Resolution:
    description: 'Specifies the interpretation of the resolution keyword.

      If an object is used, then the keys should be values for the `res` entity

      and values should be descriptions of those `res` values.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Resolution
  ResonantNucleus:
    description: 'The isotope of interest of an MR experiment (for example, `"1H"`,
      `"13C"`, `"31P"`).

      For multi-nuclei experiments such as <sup>1</sup>H-[<sup>13</sup>C] MR,

      an array can be used: `["1H", "13C"]`.

      Corresponds to [DICOM Tag 0018, 9100](http://www.dicomlookup.com/dicomtags/(0018,9100))

      `Resonant Nucleus`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ResonantNucleus
  RotationOrder:
    description: 'Specify the sequence in which the elemental 3D extrinsic rotations
      are applied around the three distinct axes.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RotationOrder
  RotationRule:
    description: 'In case orientation channels are present, indicate whether rotations
      are applied

      clockwise around an axis when seen from the positive direction (left-hand rule)
      or

      counter-clockwise (right-hand rule). Must be one of: "left-hand", "right-hand".

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RotationRule
  SEEGChannelCount:
    description: 'Number of SEEG channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SEEGChannelCount
  SampleCoordinateSystem:
    description: 'Coordinate system of the gaze position recordings.

      Generally eye-trackers are set to use `"gaze-on-screen"` coordinate system,
      but you may use

      `"eye-in-head"` or `"gaze-in-world"`.

      If none of the three default options properly describe the coordinate system,
      the

      `"custom"` keyword MUST be employed and the coordinate system MUST be described

      using additional metadata entries.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleCoordinateSystem
  SampleEmbedding:
    description: 'Description of the tissue sample embedding (for example: `"Epoxy
      resin"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleEmbedding
  SampleEnvironment:
    description: 'Environment in which the sample was imaged. MUST be one of: `"in
      vivo"`, `"ex vivo"`

      or `"in vitro"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleEnvironment
  SampleExtractionInstitution:
    description: 'The name of the institution in charge of the extraction of the sample,

      if different from the institution in charge of the equipment that produced the
      image.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleExtractionInstitution
  SampleExtractionProtocol:
    description: 'Description of the sample extraction protocol or

      [URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)

      (for example from [protocols.io](https://www.protocols.io/)).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleExtractionProtocol
  SampleFixation:
    description: 'Description of the tissue sample fixation

      (for example: `"4% paraformaldehyde, 2% glutaraldehyde"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleFixation
  SampleOrigin:
    description: 'Describes from which tissue the genetic information was extracted.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleOrigin
  SamplePrimaryAntibody:
    description: 'Description(s) of the primary antibody used for immunostaining.

      Either an [RRID](https://rrid.site) or the name, supplier and catalog

      number of a commercial antibody.

      For non-commercial antibodies either an [RRID](https://rrid.site) or the

      host-animal and immunogen used (for examples: `"RRID:AB_2122563"` or

      `"Rabbit anti-Human HTR5A Polyclonal Antibody, Invitrogen, Catalog # PA1-2453"`).

      MAY be an array of strings if different antibodies are used in each channel
      of the file.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SamplePrimaryAntibody
  SampleSecondaryAntibody:
    description: 'Description(s) of the secondary antibody used for immunostaining.

      Either an [RRID](https://rrid.site) or the name, supplier and catalog

      number of a commercial antibody.

      For non-commercial antibodies either an [RRID](https://rrid.site) or the

      host-animal and immunogen used (for examples: `"RRID:AB_228322"` or

      `"Goat anti-Mouse IgM Secondary Antibody, Invitrogen, Catalog # 31172"`).

      MAY be an array of strings if different antibodies are used in each channel
      of the file.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleSecondaryAntibody
  SampleStaining:
    description: 'Description(s) of the tissue sample staining (for example: `"Osmium"`).

      MAY be an array of strings if different stains are used in each channel of the
      file

      (for example: `["LFB", "PLP"]`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SampleStaining
  SamplingFrequency:
    description: 'Sampling frequency (in Hz) of all the data in the recording,

      regardless of their type (for example, `2400`).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SamplingFrequency
  SamplingFrequencyEffective:
    description: 'Effective sampling frequency (in Hz) of all the data in the recording,

      regardless of their type (for example, `2400`) which can be determined if timestamps

      per sample are provided.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SamplingFrequencyEffective
  SamplingFrequency__nirs:
    description: 'Sampling frequency (in Hz) of all the data in the recording,

      regardless of their type (for example, `2400`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SamplingFrequency__nirs
  ScaleFactor:
    description: 'Scale factor for each frame. This field MUST be defined if the imaging
      data (`.nii[.gz]`) are scaled.

      If this field is not defined, then it is assumed that the scaling factor is
      1. Defining this field

      when the scaling factor is 1 is RECOMMENDED, for the sake of clarity.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScaleFactor
  ScanDate:
    description: 'Date of scan in the format `"YYYY-MM-DD[Z]"`.

      Corresponds to [DICOM Tag 0008, 0022](http://www.dicomlookup.com/dicomtags/(0008,0022))
      `Acquisition Date`.

      This field is DEPRECATED, and this metadata SHOULD be recorded in the `acq_time`
      column of the

      corresponding [Scans file](SPEC_ROOT/modality-agnostic-files/data-summary-files.md#scans-file).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScanDate
  ScanOptions:
    description: 'Parameters of ScanningSequence.

      Corresponds to [DICOM Tag 0018, 0022](http://www.dicomlookup.com/dicomtags/(0018,0022))

      `Scan Options`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScanOptions
  ScanStart:
    description: 'Time of start of scan with respect to `TimeZero` in the default
      unit seconds.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScanStart
  ScanningSequence:
    description: 'Description of the type of data acquired.

      Corresponds to [DICOM Tag 0018, 0020](http://www.dicomlookup.com/dicomtags/(0018,0020))

      `Scanning Sequence`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScanningSequence
  ScanningSequence__mrs:
    description: 'Description of the type of data acquired.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScanningSequence__mrs
  ScatterFraction:
    description: 'Scatter fraction for each frame (Units: 0-100%).

      Corresponds to [DICOM Tag 0054, 1323](http://www.dicomlookup.com/dicomtags/(0054,1323))

      `Scatter Fraction Factor`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScatterFraction
  ScreenDistance:
    description: 'Distance between the participant''s eye and the screen. If no screen
      was used, use `n/a`.

      Distance can either be expressed as a single numeric value indicating the shortest
      distance between

      the participant''s eye and the screen, or a three-coordinates array indicating
      the X, Y, Z distances

      between the participant''s eye and the center of the screen.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScreenDistance
  ScreenOrigin:
    description: 'Location of the spatial coordinates'' origin for the visual stimuli
      presentation,

      described by a list of two keywords such as ("top", "left") if the coordinates

      refer to the top-left corner of the screen, or ("center", "center") if the position

      (0, 0) is at the center or the screen''s extent.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScreenOrigin
  ScreenRefreshRate:
    description: 'Refresh rate of the screen (when used), in Hertz (equivalent to
      frames per second, "FPS").

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScreenRefreshRate
  ScreenResolution:
    description: 'Screen resolution in pixel

      (for example `[1920, 1200]` for a screen of 1920-width by 1080-height pixels),

      if no screen use `n/a`.

      `ScreenResolution` is REQUIRED when the experiment included simultaneous eye-tracking

      recordings with `SampleCoordinateSystem` matching `"gaze-on-screen"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScreenResolution
  ScreenSize:
    description: 'Screen size in m, excluding potential screen borders

      (for example `[0.472, 0.295]` for a screen of 47.2-width by 29.5-height cm),

      if no screen use `n/a`.

      `ScreenSize` is REQUIRED when the experiment included simultaneous eye-tracking

      recordings with `SampleCoordinateSystem` matching `"gaze-on-screen"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ScreenSize
  SequenceName:
    description: 'Manufacturer''s designation of the sequence name.

      Corresponds to [DICOM Tag 0018, 0024](http://www.dicomlookup.com/dicomtags/(0018,0024))

      `Sequence Name`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SequenceName
  SequenceVariant:
    description: 'Variant of the ScanningSequence.

      Corresponds to [DICOM Tag 0018, 0021](http://www.dicomlookup.com/dicomtags/(0018,0021))

      `Sequence Variant`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SequenceVariant
  ShortChannelCount:
    description: 'The number of short channels. 0 indicates no short channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ShortChannelCount
  SinglesRate:
    description: 'Singles rate for each frame (same units as `Units`, for example,
      `"Bq/mL"`).

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SinglesRate
  SkinPreparation:
    description: 'How skin was prepared prior to sensor device placement, for example,
      `"alcohol wipe"`

      or `"abrasive gel"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SkinPreparation
  SkullStripped:
    description: 'Whether the volume was skull stripped (non-brain voxels set to zero)
      or not.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SkullStripped
  SliceEncodingDirection:
    description: 'The axis of the NIfTI data along which slices were acquired,

      and the direction in which `"SliceTiming"` is defined with respect to.

      `i`, `j`, `k` identifiers correspond to the first, second and third axis of

      the data in the NIfTI file.

      A `-` sign indicates that the contents of `"SliceTiming"` are defined in

      reverse order - that is, the first entry corresponds to the slice with the

      largest index, and the final entry corresponds to slice index zero.

      When present, the axis defined by `"SliceEncodingDirection"` needs to be

      consistent with the `slice_dim` field in the NIfTI header.

      When absent, the entries in `"SliceTiming"` must be in the order of increasing

      slice index as defined by the NIfTI header.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SliceEncodingDirection
  SliceThickness:
    description: 'Slice thickness of the tissue sample in the unit micrometers (`"um"`)
      (for example: `5`).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SliceThickness
  SliceTiming:
    description: 'The time at which each slice was acquired within each volume (frame)
      of the

      acquisition.

      Slice timing is not slice order -- rather, it is a list of times containing

      the time (in seconds) of each slice acquisition in relation to the beginning

      of volume acquisition.

      The list goes through the slices along the slice axis in the slice encoding

      dimension (see below).

      Note that to ensure the proper interpretation of the `"SliceTiming"` field,

      it is important to check if the OPTIONAL `SliceEncodingDirection` exists.

      In particular, if `"SliceEncodingDirection"` is negative,

      the entries in `"SliceTiming"` are defined in reverse order with respect to
      the

      slice axis, such that the final entry in the `"SliceTiming"` list is the time

      of acquisition of slice 0. Without this parameter slice time correction will

      not be possible.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SliceTiming
  SoftwareFilters:
    description: '[Object](https://www.json.org/json-en.html)

      of temporal software filters applied, or `"n/a"` if the data is

      not available.

      Each key-value pair in the JSON object is a name of the filter and an object

      in which its parameters are defined as key-value pairs

      (for example, `{"Anti-aliasing filter":

      {"half-amplitude cutoff (Hz)": 500, "Roll-off": "6dB/Octave"}}`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SoftwareFilters
  SoftwareName:
    description: 'Name of the software that was used to present the stimuli.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SoftwareName
  SoftwareRRID:
    description: '[Research Resource Identifier](https://rrid.site) of the

      software that was used to present the stimuli.

      Examples: The RRID for Psychtoolbox is ''SCR_002881'',

      and that of PsychoPy is ''SCR_006571''.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SoftwareRRID
  SoftwareVersion:
    description: 'Version of the software that was used to present the stimuli.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SoftwareVersion
  SoftwareVersions:
    description: 'Manufacturer''s designation of software version of the equipment
      that produced

      the measurements.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SoftwareVersions
  SourceDatasets:
    description: 'Used to specify the locations and relevant attributes of all source
      datasets (BIDS or not).

      Valid keys in each object include `"URL"`, `"DOI"` (see

      [URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)), and

      `"Version"` with

      [string](https://www.w3schools.com/js/js_json_datatypes.asp)

      values.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SourceDatasets
  SourceType:
    description: 'Type of source. Preferably a specific model/part number is supplied.

      This is a freeform description, but the following keywords are suggested:

      `"LED"`, `"LASER"`, `"VCSEL"`. If individual channels have different SourceType,

      then the field here should be specified as "mixed"

      and this column should be included in optodes.tsv.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SourceType
  Sources:
    description: 'A list of files with the paths specified using

      [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri);

      these files were directly used in the creation of this derivative data file.

      For example, if a derivative A is used in the creation of another

      derivative B, which is in turn used to generate C in a chain of A->B->C,

      C should only list B in `"Sources"`, and B should only list A in `"Sources"`.

      However, in case both X and Y are directly used in the creation of Z,

      then Z should list X and Y in `"Sources"`,

      regardless of whether X was used to generate Y.

      Using paths specified relative to the dataset root is

      [DEPRECATED](SPEC_ROOT/common-principles.md#definitions).

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Sources
  SpatialAxes:
    description: 'Refers to the coordinate system in which the motion data are to
      be interpreted,

      if the recorded data can be mapped to a fixed reference frame. A sequence of

      characters F/B (forward-backward), L/R (left-right), and U/D (up-down). The

      position of a character in the sequence determines which of the X,Y,Z axes it

      maps to. For example, "FRD" for X-forward, Y-right, Z-down. For 1D or 2D cases,

      only specify the used axes and use the character "_" for unused axes

      ("F_R" when the Y axis is not used, for instance).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpatialAxes
  SpatialReference:
    description: 'String or object describing the reference image to which the current
      image is aligned.

      For images with a single reference, the value MUST be a single string.

      For images with multiple references, such as surface and volume references,

      a JSON object MUST be used.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpatialReference
  Species:
    description: ''
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Species
  SpecificRadioactivity:
    description: 'Specific activity of compound injected.

      **Note this is not required for an FDG acquisition, since it is not available,

      and SHOULD be set to `"n/a"`**.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpecificRadioactivity
  SpecificRadioactivityMeasTime:
    description: 'Time to which specific radioactivity measurement above applies in
      the default

      unit `"hh:mm:ss"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpecificRadioactivityMeasTime
  SpecificRadioactivityUnits:
    description: 'Unit format of specified specific radioactivity (for example, `"Bq/g"`).

      **Note this is not required for an FDG acquisition, since it is not available,

      and SHOULD be set to `"n/a"`**.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpecificRadioactivityUnits
  SpectralWidth:
    description: 'The spectral bandwidth of the MR signal that is sampled, specified
      in Hz.

      Corresponds to [DICOM Tag 0018, 9052](http://www.dicomlookup.com/dicomtags/(0018,9052))

      `Spectral Width`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpectralWidth
  SpectrometerFrequency:
    description: 'The frequency of the spectrometer, specified in MHz.

      For example, this could be `127.764` for a 3T scanner tuned

      to the resonant frequency of <sup>1</sup>H.

      For multi-nuclei experiments such as <sup>1</sup>H-[<sup>13</sup>C] MR at 3T,

      an array can be used: `[127.731, 32.125]`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpectrometerFrequency
  SpoilingGradientDuration:
    description: 'The duration of the spoiler gradient lobe in seconds.

      The duration of a trapezoidal lobe is defined as the summation of ramp-up

      and plateau times.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpoilingGradientDuration
  SpoilingGradientMoment:
    description: 'Zeroth moment of the spoiler gradient lobe in

      millitesla times second per meter (mT.s/m).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpoilingGradientMoment
  SpoilingRFPhaseIncrement:
    description: 'The amount of incrementation described in degrees,

      which is applied to the phase of the excitation pulse at each TR period for

      achieving RF spoiling.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpoilingRFPhaseIncrement
  SpoilingState:
    description: 'Boolean stating whether the pulse sequence uses any type of spoiling

      strategy to suppress residual transverse magnetization.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpoilingState
  SpoilingType:
    description: 'Specifies which spoiling method(s) are used by a spoiled sequence.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SpoilingType
  StartTime:
    description: 'Start time in seconds in relation to the start of acquisition of
      the first

      data sample in the corresponding (neural) dataset (negative values are allowed).

      This data MAY be specified with sub-second precision using the syntax `s[.000000]`,

      where `s` reflects whole seconds, and `.000000` reflects OPTIONAL fractional
      seconds.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#StartTime
  StationName:
    description: 'Institution defined name of the machine that produced the measurements.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#StationName
  StimulusPresentation:
    description: 'Object containing key-value pairs related to the software used to
      present

      the stimuli during the experiment.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#StimulusPresentation
  SubjectArtefactDescription:
    description: 'Freeform description of the observed subject artifact and its possible
      cause

      (for example, `"Vagus Nerve Stimulator"`, `"non-removable implant"`).

      If this field is set to `"n/a"`, it will be interpreted as absence of major

      source of artifacts except cardiac and blinks.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SubjectArtefactDescription
  TablePosition:
    description: 'The table position, relative to an implementation-specific reference
      point,

      often the isocenter. Values must be an array (1x3) of three distances in

      millimeters in absolute coordinates (world coordinates). If an observer

      stands in front of the scanner looking at it, a table moving to the left,

      up or into the scanner (from the observer''s point of view) will increase

      the 1st, 2nd and 3rd value in the array respectively. The origin is defined

      by the image affine.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TablePosition
  TaskDescription:
    description: 'Longer description of the task.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TaskDescription
  TaskName:
    description: 'Name of the task.

      No two tasks should have the same name.

      The task label included in the filename MAY be derived from this `"TaskName"`
      field

      by removing all non-alphanumeric or `+` characters (that is, all except those
      matching `[0-9a-zA-Z+]`),

      and potentially replacing spaces with `+` to ease readability.

      For example `"TaskName"` `"faces n-back"` or `"head nodding"` could correspond
      to task labels

      `faces+n+back` or `facesnback` and `head+nodding` or `headnodding`, respectively.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TaskName
  TermURL:
    description: 'URL pointing to a formal definition of this type of data in an ontology
      available on the web.

      For example: https://www.ncbi.nlm.nih.gov/mesh/68008297 for "male".

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TermURL
  TimeZero:
    description: 'Time zero to which all scan and/or blood measurements have been
      adjusted to,

      in the unit "hh:mm:ss".

      This should be equal to `"InjectionStart"` or `"ScanStart"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TimeZero
  TissueDeformationScaling:
    description: 'Estimated deformation of the tissue, given as a percentage of the
      original

      tissue size (for examples: for a shrinkage of 3%, the value is `97`;

      and for an expansion of 100%, the value is `200`).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TissueDeformationScaling
  TissueOrigin:
    description: 'Describes the type of tissue analyzed for `"SampleOrigin"` `brain`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TissueOrigin
  TotalAcquiredPairs:
    description: 'The total number of acquired `control`-`label` pairs.

      A single pair consists of a single `control` and a single `label` image.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TotalAcquiredPairs
  TotalReadoutTime:
    description: 'This is actually the "effective" total readout time,

      defined as the readout duration, specified in seconds,

      that would have generated data with the given level of distortion.

      It is NOT the actual, physical duration of the readout train.

      If `"EffectiveEchoSpacing"` has been properly computed,

      it is just `EffectiveEchoSpacing * (ReconMatrixPE - 1)`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TotalReadoutTime
  TracerMolecularWeight:
    description: 'Accurate molecular weight of the tracer used.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerMolecularWeight
  TracerMolecularWeightUnits:
    description: 'Unit of the molecular weights measurement (for example, `"g/mol"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerMolecularWeightUnits
  TracerName:
    description: 'Name of the tracer compound used (for example, `"CIMBI-36"`)

      Corresponds to [DICOM Tag 0054, 0300](http://www.dicomlookup.com/dicomtags/(0054,0300))

      `Radionuclide Code Sequence`,

      extracted from the fields [0008, 0122](http://www.dicomlookup.com/dicomtags/(0008,0122))

      `Mapping Resource Name`

      and/or [0008, 0105](http://www.dicomlookup.com/dicomtags/(0008,0105)) `Mapping
      Resource`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerName
  TracerRadLex:
    description: 'ID of the tracer compound from the RadLex Ontology.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerRadLex
  TracerRadionuclide:
    description: 'Radioisotope labeling tracer (for example, `"C11"`).

      Corresponds to [DICOM Tag 0054, 0300](http://www.dicomlookup.com/dicomtags/(0054,0300))

      `Radionuclide Code Sequence`,

      extracted from the fields [0008, 0100](http://www.dicomlookup.com/dicomtags/(0008,0100))
      `Code Value`

      and/or [0008, 0104](http://www.dicomlookup.com/dicomtags/(0008,0104)) `Code
      Meaning`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerRadionuclide
  TracerSNOMED:
    description: 'ID of the tracer compound from the SNOMED Ontology

      (subclass of Radioactive isotope).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TracerSNOMED
  TrackedPointsCount:
    description: 'Number of different tracked points tracked in a motion tracking
      system.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TrackedPointsCount
  TrackingSystemName:
    description: 'A human-readable name of the tracking system to complement `"tracksys"`
      label

      of the corresponding *_motion.tsv filename.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TrackingSystemName
  TriggerChannelCount:
    description: 'Number of channels for digital (binary TTL) triggers or analog equivalents
      (TTL in volt).

      Corresponds to the `TRIG` channel type.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TriggerChannelCount
  TubingLength:
    description: 'The length of the blood tubing, from the subject to the detector
      in meters.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TubingLength
  TubingType:
    description: 'Description of the type of tubing used, ideally including the material
      and

      (internal) diameter.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TubingType
  Type:
    description: 'Short identifier of the mask.

      The value `"Brain"` refers to a brain mask.

      The value `"Lesion"` refers to a lesion mask.

      The value `"Face"` refers to a face mask.

      The value `"ROI"` refers to a region of interest mask.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Type
  URL:
    description: 'A Uniform Resource Locator (URL) is a structured reference to an
      object that

      includes a resource transfer scheme and a location.

      (see [URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator))

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#URL
  Units:
    description: 'Measurement units for the associated variable.

      SI units in CMIXF formatting are RECOMMENDED

      (see [Units](SPEC_ROOT/common-principles.md#units)).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Units
  VELChannelCount:
    description: 'Number of linear velocity channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VELChannelCount
  VascularCrushing:
    description: 'Boolean indicating if Vascular Crushing is used.

      Corresponds to [DICOM Tag 0018, 9259](http://www.dicomlookup.com/dicomtags/(0018,9259))

