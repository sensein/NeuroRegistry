      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VascularCrushing
  VascularCrushingVENC:
    description: 'The crusher gradient strength, in centimeters per second.

      Specify either one number for the total time-series, or provide an array of

      numbers, for example when using QUASAR, using the value zero to identify

      volumes for which `VascularCrushing` was turned off.

      Corresponds to [DICOM Tag 0018, 925A](http://www.dicomlookup.com/dicomtags/(0018,925A))

      `ASL Crusher Flow Limit`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VascularCrushingVENC
  Version__Dataset:
    description: Version of the dataset.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Version__Dataset
  Version__GeneratedBy:
    description: Version of the pipeline
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Version__GeneratedBy
  VisionCorrection:
    description: 'Equipment used to correct participant vision during an experiment.

      Example: "spectacles", "lenses", "none".

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VisionCorrection
  VolumeAffineMatrix:
    description: 'A 4-by-4 matrix using identical conventions and coordinate system
      to

      the *{qs}form* NIfTI affine matrix to define the orientation,

      position, and size of an additional VOI.

      This VOI defines a spatial region in addition to the primary method of localization

      (encoded in the NIfTI header *{qs}form*).

      Typically not defined for data stored with a single spatial voxel or FID-MRSI.

      For example: `[[30, 0, 0, -30], [0, 30, -2.27, -72.67], [0, 2.27, 29.91, 5.47],

      [0, 0, 0, 1]]`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VolumeAffineMatrix
  VolumeTiming:
    description: 'The time at which each volume was acquired during the acquisition.

      It is described using a list of times referring to the onset of each volume

      in the series.

      The list must have the same length as the series,

      and the values must be non-negative and monotonically increasing.

      This field is mutually exclusive with `"RepetitionTime"`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VolumeTiming
  WaterSuppression:
    description: 'Boolean indicating whether water suppression was used prior to acquisition.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#WaterSuppression
  WaterSuppressionTechnique:
    description: 'The name of the pulse sequence used for water suppression (for example,
      `"CHESS"`, `"VAPOR"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#WaterSuppressionTechnique
  WholeBloodAvail:
    description: 'Boolean that specifies if whole blood measurements are available.

      If `true`, the `whole_blood_radioactivity` column MUST be present in the

      corresponding `*_blood.tsv` file.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#WholeBloodAvail
  WithdrawalRate:
    description: 'The rate at which the blood was withdrawn from the subject.

      The unit of the specified withdrawal rate should be in `"mL/s"`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#WithdrawalRate
  abbreviation:
    description: 'The unique label abbreviation

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#abbreviation
  acq_time__scans:
    description: 'Acquisition time refers to when the first data point in each run
      was acquired.

      Furthermore, if this header is provided, the acquisition times of all files

      from the same recording MUST be identical.

      Datetime format and their deidentification are described in

      [Units](SPEC_ROOT/common-principles.md#units).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#acq_time__scans
  acq_time__sessions:
    description: 'Acquisition time refers to when the first data point of the first
      run was acquired.

      Datetime format and their deidentification are described in

      [Units](SPEC_ROOT/common-principles.md#units).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#acq_time__sessions
  age:
    description: 'Numeric value (float or integer value).

      By default expressed using "year" as the unit. Other possible "Units" are described
      in

      [Units](SPEC_ROOT/common-principles.md#units).


      For privacy purposes, participant ages should be capped at 89 years.

      Using "89+" for ages above 88 is DEPRECATED.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#age
  cardiac:
    description: 'continuous pulse measurement

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#cardiac
  channel:
    description: 'Channel(s) associated with an event.

      If multiple channels are specified, they MUST be separated by a delimiter

      specified in the `"Delimiter"` field describing the `channel` column.

      For example, channels separated with a comma (`,`) require the `events.json`

      file to contain `"channel": {"Delimiter": ","}`.

      In the absence of a delimiter, tools MUST interpret any character as being part

      of a channel name.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#channel
  color:
    description: 'Hexadecimal. Label color for visualization.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#color
  component:
    description: 'Description of the spatial axis or label of quaternion component
      associated with the channel.

      For example, `x`,`y`,`z` for position channels,

      or `quat_x`, `quat_y`, `quat_z`, `quat_w` for quaternion orientation channels.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#component
  coordinate_system:
    description: 'Name of the coordinate system defined in `coordsystem.json` in which
      the electrode''s

      `x`, `y`, and (optionally) `z` coordinates are given.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#coordinate_system
  derived_from:
    description: '`sample-<label>` entity from which a sample is derived,

      for example a slice of tissue (`sample-02`) derived from a block of tissue (`sample-01`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#derived_from
  desc_id:
    description: 'A `desc-<label>` entity present in the derivatives dataset.


      The `desc_id` column contains the labels used with the

      [`desc` entity](SPEC_ROOT/appendices/entities.md#desc),

      within the particular nesting that the `descriptions.tsv` file is placed.


      For example, if the `descriptions.tsv` file is placed at the root of the derivative
      dataset,

      its `desc_id` column SHOULD contain all labels of the `desc` entity)

      used across the entire derivative dataset.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#desc_id
  description:
    description: 'Brief free-text description of the channel, or other information
      of interest.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description
  description__entities:
    description: 'Free-form text description of the entity''s label (defined in `<entity>_id`
      column).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description__entities
  description__optode:
    description: 'Free-form text description of the optode, or other information of
      interest.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description__optode
  detector__channels:
    description: 'Name of the detector as specified in the `*_optodes.tsv` file.

      `n/a` for channels that do not contain NIRS signals (for example, acceleration).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#detector__channels
  detector_type:
    description: 'The type of detector. Only to be used if the field `DetectorType`
