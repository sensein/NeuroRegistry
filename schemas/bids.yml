classes:
  Adc:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ADC
    description: Apparent diffusion coefficient (ADC) map
    slots: []
  Anat:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#anat
    description: Magnetic resonance imaging sequences designed to characterize static,
      anatomical features.
    slots: []
  Angio:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#angio
    description: 'Magnetic resonance angiography sequences focus on enhancing the
      contrast of

      blood vessels (generally arteries, but sometimes veins) against other tissue

      types.'
    slots: []
  Asl:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#asl
    description: 'The complete ASL time series stored as a 4D NIfTI file in the original

      acquisition order, with possible volume types including: control, label,

      m0scan, deltam, cbf.'
    slots: []
  Aslcontext:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#aslcontext
    description: A TSV file defining the image types for volumes in an associated
      ASL file.
    slots: []
  Asllabeling:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#asllabeling
    description: 'A deidentified screenshot of the planning of the labeling slab/plane

      with respect to the imaging slab or slices.

      This screenshot is based on DICOM macro C.8.13.5.14.'
    slots: []
