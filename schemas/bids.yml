      [0018, 0027](http://www.dicomlookup.com/dicomtags/(0018,0027)) `Intervention
      Drug Stop Time` and

      [0018, 0035](http://www.dicomlookup.com/dicomtags/(0018,0035)) `Intervention
      Drug Start Time`.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalDoseTime
  metadata__PharmaceuticalDoseUnits:
