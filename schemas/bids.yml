    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGChannelCount
  metadata__EEGCoordinateSystem:
    description: 'Defines the coordinate system for the EEG sensors.


      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `EEGCoordinateSystemDescription`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateSystem
  metadata__EEGCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the

      system in greater detail.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateSystemDescription
  metadata__EEGCoordinateUnits:
    description: Units of the coordinates of `EEGCoordinateSystem`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateUnits
  metadata__EEGGround:
    description: 'Description of the location of the ground electrode

      (for example, `"placed on right mastoid (M2)"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGGround
  metadata__EEGPlacementScheme:
    description: 'Placement scheme of EEG electrodes.

      Either the name of a standardized placement system (for example, `"10-20"`)

      or a list of standardized electrode names (for example, `["Cz", "Pz"]`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGPlacementScheme
  metadata__EEGReference:
    description: 'General description of the reference scheme used and (when applicable)
      of

      location of the reference electrode in the raw recordings

      (for example, `"left mastoid"`, `"Cz"`, `"CMS"`).

      If different channels have a different reference,

      this field should have a general description and the channel specific

      reference should be defined in the `channels.tsv` file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGReference
  metadata__EMGChannelCount:
    description: Number of EMG channels.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGChannelCount
  metadata__EMGCoordinateSystem:
    description: 'Defines the coordinate system for the EMG sensors.


      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `EMGCoordinateSystemDescription`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGCoordinateSystem
  metadata__EMGCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system, typically defining
      the origin

      and positive x,y,z axis directions, relative to anatomical landmarks.

      May also include a link to a documentation page or paper describing the

      system in greater detail.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGCoordinateSystemDescription
  metadata__EMGCoordinateUnits:
    description: Units of the coordinates of `EMGCoordinateSystem`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGCoordinateUnits
  metadata__EMGGround:
    description: 'Description of the location of the ground electrode

      (for example, `"right radial styloid process"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGGround
  metadata__EMGPlacementScheme:
    description: 'The way in which electrode placement locations were determined.

      If electrode locations are provided as coordinates in `*_electrodes.tsv` in
      reference

      to a coordinate system defined in `*_coordsystem.json`, then specify `"Measured"`.

      If approach to placement varied across sensor devices, specify `"ChannelSpecific"`

      and include placement details in the `placement_scheme` column of `*_channels.tsv`.

      If a standardized electrode placement procedure (for example, SENIAM 8) was
      followed,

      or if an ad-hoc procedure was followed, specify `"Other"` and provide details
      in

      `EMGPlacementSchemeDescription`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGPlacementScheme
  metadata__EMGPlacementSchemeDescription:
    description: 'Additional details of the approach to EMG sensor placement.

      Descriptions SHOULD NOT simply give the name of the targeted muscle (use the

      `target_muscle` column in `*_channels.tsv` for that), but rather SHOULD reflect
      the

      process used by the researcher(s) when placing electrodes.

      For example, EMG electrode sites may be chosen by *measured distance* from anatomical

      landmarks, by *visual reference* to (parts of) target muscles, by *palpation*
      of the

      skin to locate target muscles, or by *functional localization* (temporary electrode

      placement at several sites during prescribed behavior, until a site yielding
      strong

      EMG signal is found).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGPlacementSchemeDescription
  metadata__EMGReference:
    description: 'Description of the approach to signal referencing.

      If the same signal source is used as reference for all channels (often called
      a

      "monopolar" recording), specify the signal source (typically an electrode name).

      If different channels have different reference electrodes, this field SHOULD
      contain

      the string `"ChannelSpecific"` and each channel''s reference SHOULD be given
      in the

      `reference` column of `*_channels.tsv`.

      For bipolar recording devices (where a single sensor unit contains two rigidly

      separated contacts, and the paired contacts are not listed independently in

      `*_electrodes.tsv`), this field SHOULD be `"Bipolar"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EMGReference
  metadata__EOGChannelCount:
    description: Number of EOG channels.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EOGChannelCount
  metadata__EchoAcquisition:
    description: 'How the detected echo was acquired when the analog-to-digital converter
      was turned on.

      For example, `"Half echo"`, `"Full echo"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EchoAcquisition
  metadata__EchoTime:
    description: 'The echo time (TE) for the acquisition, specified in seconds.

      Corresponds to [DICOM Tag 0018, 0081](http://www.dicomlookup.com/dicomtags/(0018,0081))

      `Echo Time`

      (please note that the DICOM term is in milliseconds not seconds).

      The data type number may apply to files from any MRI modality concerned with

      a single value for this field, or to the files in a

      [file collection](SPEC_ROOT/appendices/file-collections.md)

      where the value of this field is iterated using the

      [`echo` entity](SPEC_ROOT/appendices/entities.md#echo).'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EchoTime
  metadata__EchoTime1:
    description: The time (in seconds) when the first (shorter) echo occurs.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EchoTime1
  metadata__EchoTime2:
    description: The time (in seconds) when the second (longer) echo occurs.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EchoTime2
  metadata__EchoTime__fmap:
    description: The time (in seconds) when the echo corresponding to this map was
      acquired.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EchoTime__fmap
  metadata__EditCondition:
    description: 'If spectral editing was applied, this lists the application order
      of `"EditPulse"`.

      For example, `["ON", "OFF"]` for a MEGA-edited experiment or

      `["A", "B", "C", "D"]` for a HERMES-edited experiment.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EditCondition
  metadata__EditPulse:
    description: 'If spectral editing was applied, this details the editing parameters.

      For example:

      `{"ON": {"FrequencyOffset": 1.9, "PulseDuration": 16},

      "OFF": {"FrequencyOffset": 7.5, "PulseDuration": 16}}`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EditPulse
  metadata__EditTarget:
    description: 'If spectral editing was applied, this describes the metabolites
      that were selectively targeted

      (for example, `"GABA"` or `"Lac"`).

      If multiple metabolites were targeted (for example, in a HERMES acquisition),

      an array can be used: `["GABA", "GSH"]`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EditTarget
  metadata__EffectiveEchoSpacing:
    description: 'The "effective" sampling interval, specified in seconds,

      between lines in the phase-encoding direction,

      defined based on the size of the reconstructed image in the phase direction.

      It is frequently, but incorrectly, referred to as "dwell time"

      (see the `"DwellTime"` parameter for actual dwell time).

      It is required for unwarping distortions using field maps.

      Note that beyond just in-plane acceleration,

      a variety of other manipulations to the phase encoding need to be accounted

      for properly, including partial fourier, phase oversampling,

      phase resolution, phase field-of-view and interpolation.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EffectiveEchoSpacing
  metadata__ElectricalStimulation:
    description: 'Boolean field to specify if electrical stimulation was done during
      the

      recording (options are `true` or `false`). Parameters for event-like

      stimulation should be specified in the `events.tsv` file.'
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectricalStimulation
  metadata__ElectricalStimulationParameters:
    description: 'Free form description of stimulation parameters, such as frequency
      or shape.

      Specific onsets can be specified in the `events.tsv` file.

      Specific shapes can be described here in freeform text.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectricalStimulationParameters
  metadata__ElectrodeManufacturer:
    description: 'Can be used if all electrodes are of the same manufacturer

      (for example, `"AD-TECH"`, `"DIXI"`).

      If electrodes of different manufacturers are used,

      please use the corresponding table in the `_electrodes.tsv` file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeManufacturer
  metadata__ElectrodeManufacturersModelName:
    description: 'If different electrode types are used,

      please use the corresponding table in the `_electrodes.tsv` file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeManufacturersModelName
  metadata__ElectrodeMaterial:
    description: 'Material of the electrode (for example, `Tin`, `Ag/AgCl`, `Gold`).

      If multiple sensor devices with heterogeneous electrode materials are recorded
      into

      the same data file,

      electrode material SHOULD be recorded in the `material` column of `*_electrodes.tsv`
      instead.

      If instead those devices were recorded into separate data files (distinguished
      for example

      by the `recording` entity),

      separate `*_emg.json` files (similarly distinguished) MAY be included,

      each with their own `ElectrodeMaterial` values.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeMaterial
  metadata__ElectrodeType:
    description: Type of the electrode (for example, cup, ring, clip-on, wire, needle).
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ElectrodeType
  metadata__EncodingTechnique:
    description: 'The encoding technique used during readout.

      For example, `"Cartesian"`, `"EPSI"`, `"Spiral"`,

      or `"Density-weighted concentric ring trajectory"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EncodingTechnique
  metadata__EpochLength:
    description: 'Duration of individual epochs in seconds (for example, `1`)

      in case of epoched data.

      If recording was continuous or discontinuous, leave out the field.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EpochLength
  metadata__EstimationAlgorithm:
    description: 'Type of algorithm used to perform fitting

      (for example, `"linear"`, `"non-linear"`, `"LM"` and such).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EstimationAlgorithm
  metadata__EstimationReference:
    description: Reference to the study/studies on which the implementation is based.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EstimationReference
  metadata__EthicsApprovals:
    description: 'List of ethics committee approvals of the research protocols and/or

      protocol identifiers.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EthicsApprovals
  metadata__EyeTrackerDistance:
    description: 'Distance (in meters) between the eye-tracker and the participant
      eye(s).

      Distance can either be expressed as a single numeric value indicating the shortest
      distance

      between the participant''s eye and the eye-tracker''s camera, or a three-coordinates
      array

      indicating the X, Y, Z distances between the participant''s eye and the eye-tracker''s

      camera.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EyeTrackerDistance
  metadata__EyeTrackingMethod:
    description: 'Method used to track gaze or pupil position:

      "P–CR" for video based eye-tracking using pupil and corneal reflection;

      "DPI" for Dual-Purkinje Imaging system, "SSC" for scleral search coils;

      "EOG" for electro-oculogram; "Limbus" for trackers estimating limbus borders

      between the iris and sclera; or other.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EyeTrackingMethod
  metadata__FiducialsCoordinateSystem:
    description: 'Defines the coordinate system for the fiducials.

      Preferably the same as the `"EEGCoordinateSystem"`.

      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `"FiducialsCoordinateSystemDescription"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FiducialsCoordinateSystem
  metadata__FiducialsCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the

      system in greater detail.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FiducialsCoordinateSystemDescription
  metadata__FiducialsCoordinateUnits:
    description: 'Units in which the coordinates that are  listed in the field

      `"FiducialsCoordinateSystem"` are represented.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FiducialsCoordinateUnits
  metadata__FiducialsCoordinates:
    description: 'Key-value pairs of the labels and 3-D digitized position of anatomical

      landmarks, interpreted following the `"FiducialsCoordinateSystem"`

      (for example, `{"NAS": [12.7,21.3,13.9], "LPA": [5.2,11.3,9.6],

      "RPA": [20.2,11.3,9.1]}`).

      Each array MUST contain three numeric values corresponding to x, y, and z

      axis of the coordinate system in that exact order.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FiducialsCoordinates
  metadata__FiducialsDescription:
    description: 'Free-form text description of how the fiducials such as vitamin-E
      capsules

      were placed relative to anatomical landmarks,

      and how the position of the fiducials were measured

      (for example, `"both with Polhemus and with T1w MRI"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FiducialsDescription
  metadata__FlipAngle:
    description: 'Flip angle (FA) for the acquisition, specified in degrees.

      Corresponds to: [DICOM Tag 0018, 1314](http://www.dicomlookup.com/dicomtags/(0018,1314))

      `Flip Angle`.

      The data type number may apply to files from any MRI modality concerned with

      a single value for this field, or to the files in a

      [file collection](SPEC_ROOT/appendices/file-collections.md)

      where the value of this field is iterated using the

      [`flip` entity](SPEC_ROOT/appendices/entities.md#flip).'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FlipAngle
  metadata__Format:
    description: Permitted formats for values in the described column.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Format
  metadata__FrameAcquisitionDuration:
    description: 'Duration (in seconds) of volume acquisition.

      Corresponds to DICOM Tag 0018, 9220 `Frame Acquisition Duration`.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FrameAcquisitionDuration
  metadata__FrameDuration:
    description: 'Time duration of each frame in default unit seconds.

      This corresponds to [DICOM Tag 0018, 1242](http://www.dicomlookup.com/dicomtags/(0018,1242))

      `Actual Frame Duration` converted to seconds.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FrameDuration
  metadata__FrameTimesStart:
    description: Start times for all frames relative to `"TimeZero"` in default unit
      seconds.
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FrameTimesStart
  metadata__FrequencyOffset:
    description: List or value for frequency offset for spectral editing in ppm. See
      EditPulse
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FrequencyOffset
  metadata__Funding:
    description: List of sources of funding (grant numbers).
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Funding
  metadata__GYROChannelCount:
    description: Number of gyrometer channels.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#GYROChannelCount
  metadata__Gain:
    description: 'Signal gain from an in-line amplifier, applied between the EMG sensor/device
      and the data acquisition computer.

      See also Preamplification.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Gain
  metadata__GeneratedBy:
    description: Used to specify provenance of the dataset.
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#GeneratedBy
  metadata__GeneticLevel:
    description: 'Describes the level of analysis.

      Values MUST be one of `"Genetic"`, `"Genomic"`, `"Epigenomic"`,

      `"Transcriptomic"`, `"Metabolomic"`, or `"Proteomic"`.


      For more information on these levels, see

      [Multi-omics approaches to disease](https://genomebiology.biomedcentral.com/articles/10.1186/s13059-017-1215-1)

      by Hasin et al. 2017.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#GeneticLevel
  metadata__Genetics:
    description: An object containing information about the genetics descriptor.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Genetics
  metadata__GradientSetType:
    description: 'It should be possible to infer the gradient coil from the scanner
      model.

      If not, for example because of a custom upgrade or use of a gradient

      insert set, then the specifications of the actual gradient coil should be

      reported independently.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#GradientSetType
  metadata__HED:
    description: 'Hierarchical Event Descriptor (HED) information,

      see the [HED Appendix](SPEC_ROOT/appendices/hed.md) for details.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HED
  metadata__HEDVersion:
    description: 'If HED tags are used:

      The version of the HED schema used to validate HED tags for study.

      May include a single schema or a base schema and one or more library schema.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HEDVersion
  metadata__Haematocrit:
    description: 'Measured haematocrit, meaning the volume of erythrocytes divided
      by the

      volume of whole blood.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Haematocrit
  metadata__HardcopyDeviceSoftwareVersion:
    description: 'Manufacturer''s designation of the software of the device that created
      this

      Hardcopy Image (the printer).

      Corresponds to [DICOM Tag 0018, 101A](http://www.dicomlookup.com/dicomtags/(0018,101A))

      `Hardcopy Device Software Version`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HardcopyDeviceSoftwareVersion
  metadata__HardwareFilters:
    description: 'Object of temporal hardware filters applied, or `"n/a"` if the data
      is not

      available. Each key-value pair in the JSON object is a name of the filter and

      an object in which its parameters are defined as key-value pairs.

      For example, `{"Highpass RC filter": {"Half amplitude cutoff (Hz)":

      0.0159, "Roll-off": "6dB/Octave"}}`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HardwareFilters
  metadata__HeadCircumference:
    description: Circumference of the participant's head, expressed in cm (for example,
      `58`).
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HeadCircumference
  metadata__HeadCoilCoordinateSystem:
    description: 'Defines the coordinate system for the head coils.

      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `HeadCoilCoordinateSystemDescription`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HeadCoilCoordinateSystem
  metadata__HeadCoilCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the system
      in greater detail.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HeadCoilCoordinateSystemDescription
  metadata__HeadCoilCoordinateUnits:
    description: Units of the coordinates of `HeadCoilCoordinateSystem`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HeadCoilCoordinateUnits
  metadata__HeadCoilCoordinates:
    description: 'Key-value pairs describing head localization coil labels and their

      coordinates, interpreted following the `HeadCoilCoordinateSystem`

      (for example, `{"NAS": [12.7,21.3,13.9], "LPA": [5.2,11.3,9.6],

      "RPA": [20.2,11.3,9.1]}`).

      Note that coils are not always placed at locations that have a known

      anatomical name (for example, for Neuromag/Elekta/MEGIN, Yokogawa systems);

      in that case generic labels can be used

      (for example, `{"coil1": [12.2,21.3,12.3], "coil2": [6.7,12.3,8.6],

