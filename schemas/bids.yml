    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template_y
  template_z:
    description: 'Assumed or ideal position along the z axis.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template_z
  time:
