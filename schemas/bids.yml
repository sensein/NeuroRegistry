      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DeidentificationMethod
  DeidentificationMethodCodeSequence:
    description: 'A sequence of code objects describing the mechanism or method use
