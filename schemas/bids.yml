      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReconFilterSize
  ReconFilterType:
    description: 'Type of post-recon smoothing (for example, `["Shepp"]`).

