classes:
  BIDSDataset:
    class_uri: https://bids-specification.readthedocs.io/en/stable/
    description: A BIDS-compliant dataset.
    slots:
    - ACCELChannelCount
    - AnchorCoordinates
    - AnchorElectrode
    - Acknowledgements
    - AcquisitionDuration
    - AcquisitionMode
    - AcquisitionVoxelSize
    - Anaesthesia
    - AnalyticalApproach
    - AnatomicalImage
    - AnatomicalLandmarkCoordinateSystem
    - AnatomicalLandmarkCoordinateSystemDescription
    - AnatomicalLandmarkCoordinateUnits
    - AnatomicalLandmarkCoordinates
    - AnatomicalLandmarkCoordinates__mri
    - ANGACCELChannelCount
    - ArterialSpinLabelingType
    - AssociatedEmptyRoom
    - AtlasName
    - AtlasSampleSize
    - AttenuationCorrection
    - AttenuationCorrectionMethodReference
    - Authors
    - AverageCalibrationError
    - B0FieldIdentifier
    - B0FieldSource
    - B0ShimmingTechnique
    - B1ShimmingTechnique
    - BIDSVersion
    - BackgroundSuppression
    - BackgroundSuppressionNumberPulses
    - BackgroundSuppressionPulseTime
    - BasedOn
    - BloodDensity
    - BodyPart
    - BodyPartDetails
    - BodyPartDetailsOntology
    - BolusCutOffDelayTime
    - BolusCutOffFlag
    - BolusCutOffTechnique
    - BrainLocation
    - CalibrationCount
    - CalibrationPosition
    - CalibrationType
    - CalibrationUnit
    - CASLType
    - CapManufacturer
    - CapManufacturersModelName
    - CellType
    - ChemicalShiftOffset
    - ChemicalShiftReference
    - ChunkTransformationMatrix
    - ChunkTransformationMatrixAxis
    - Code
    - CodeValue
    - CodeMeaning
    - CodingSchemeDesignator
    - CodingSchemeVersion
    - CodeURL
    - CogAtlasID
default_prefix: bids
default_range: string
description: Brain Imaging Data Structure (BIDS) specification schema.
id: https://bids-specification.readthedocs.io/en/stable/
imports:
- linkml:types
license: CC0-1.0
name: bids
prefixes:
  bids: https://bids-specification.readthedocs.io/en/stable/
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
slots:
  ACCELChannelCount:
    description: 'Number of acceleration channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ACCELChannelCount
  ANGACCELChannelCount:
    description: 'Number of angular acceleration channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ANGACCELChannelCount
  Acknowledgements:
    description: 'Text acknowledging contributions of individuals or institutions
      beyond

      those listed in Authors or Funding.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Acknowledgements
  AcquisitionDuration:
    description: 'Duration (in seconds) of scan acquisition, including all volumes
      for multi-volume scans.

      Corresponds to [DICOM Tag 0018, 9073](http://www.dicomlookup.com/dicomtags/(0018,9073))

      `Acquisition Duration`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionDuration
  AcquisitionMode:
    description: 'Type of acquisition of the PET data (for example, `"list mode"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionMode
  AcquisitionVoxelSize:
    description: 'An array of numbers with a length of 3, in millimeters.

      This field denotes the original acquisition voxel size,

      excluding any inter-slice gaps and before any interpolation or resampling

      within reconstruction or image processing.

      Any point spread function effects, for example due to T2-blurring,

      that would decrease the effective resolution are not considered here.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionVoxelSize
  Anaesthesia:
    description: 'Details of anaesthesia used, if any.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Anaesthesia
  AnalyticalApproach:
    description: 'Methodology or methodologies used to analyze the `"GeneticLevel"`.

      Values MUST be taken from the

      [database of Genotypes and Phenotypes

      (dbGaP)](https://www.ncbi.nlm.nih.gov/gap/advanced)

      under /Study/Molecular Data Type (for example, SNP Genotypes (Array) or

      Methylation (CpG).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnalyticalApproach
  AnatomicalImage:
    description: 'The path(s) to the anatomical MR image file(s), if present,

      to which the associated MRS data file corresponds.

      Contains one or more [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalImage
  AnatomicalLandmarkCoordinateSystem:
    description: 'Defines the coordinate system for the anatomical landmarks.

      See the [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `"AnatomicalLandmarkCoordinateSystemDescription"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateSystem
  AnatomicalLandmarkCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the

      system in greater detail.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateSystemDescription
  AnatomicalLandmarkCoordinateUnits:
    description: 'Units of the coordinates of `"AnatomicalLandmarkCoordinateSystem"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateUnits
  AnatomicalLandmarkCoordinates:
    description: 'Key-value pairs of the labels and 3-D digitized locations of anatomical
      landmarks,

      interpreted following the `"AnatomicalLandmarkCoordinateSystem"`

      (for example, `{"NAS": [12.7,21.3,13.9], "LPA": [5.2,11.3,9.6],

      "RPA": [20.2,11.3,9.1]}`.

      Each array MUST contain three numeric values corresponding to x, y, and z

      axis of the coordinate system in that exact order.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinates
  AnatomicalLandmarkCoordinates__mri:
    description: 'Key-value pairs of any number of additional anatomical landmarks
      and their

      coordinates in voxel units (where first voxel has index 0,0,0)

      relative to the associated anatomical MRI

      (for example, `{"AC": [127,119,149], "PC": [128,93,141],

      "IH": [131,114,206]}`, or `{"NAS": [127,213,139], "LPA": [52,113,96],

      "RPA": [202,113,91]}`).

      Each array MUST contain three numeric values corresponding to x, y, and z

      axis of the coordinate system in that exact order.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinates__mri
  AnchorCoordinates:
    description: 'Coordinates of the `AnchorElectrode` in the parent (anatomical)
      coordinate system.

      This should be an array of numbers of length 3, in the units given in

      `EMGCoordinateSystemUnits` within the JSON object named in `ParentCoordinateSystem`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnchorCoordinates
  AnchorElectrode:
    description: 'Name of the electrode in the child (device) coordinate system whose
      coordinates in

      the parent (anatomical) coordinate system are given in `AnchorCoordinates`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnchorElectrode
  ArterialSpinLabelingType:
    description: 'The arterial spin labeling type.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ArterialSpinLabelingType
  AssociatedEmptyRoom:
    description: 'One or more [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri)

      pointing to empty-room file(s) associated with the subject''s MEG recording.

      Using forward-slash separated paths relative to the dataset root is

      [DEPRECATED](SPEC_ROOT/common-principles.md#definitions).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AssociatedEmptyRoom
  AtlasName:
    description: 'Name of the atlas.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AtlasName
  AtlasSampleSize:
    description: 'Number of items (typically, independent participants;

      although it could also refer to, for example, sessions)

      that were employed to create the corresponding atlas.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AtlasSampleSize
  AttenuationCorrection:
    description: 'Short description of the attenuation correction method used.

      Corresponds to [DICOM Tag 0054, 1101](http://www.dicomlookup.com/dicomtags/(0054,1101))

      `Attenuation Correction Method`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AttenuationCorrection
  AttenuationCorrectionMethodReference:
    description: 'Reference paper for the attenuation correction method used.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AttenuationCorrectionMethodReference
  Authors:
    description: 'List of contributors to the creation and/or curation of the dataset.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Authors
  AverageCalibrationError:
    description: 'Average calibration error in degrees of visual angle.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AverageCalibrationError
  B0FieldIdentifier:
    description: 'The presence of this key states that this particular 3D or 4D image
      MAY be

      used for fieldmap estimation purposes.

      Each `"B0FieldIdentifier"` MUST be a unique string within one participant''s
      tree,

      shared only by the images meant to be used as inputs for the estimation of a

      particular instance of the *B<sub>0</sub> field* estimation.

      It is RECOMMENDED to derive this identifier from DICOM Tags, for example,

      DICOM tag 0018, 1030 `Protocol Name`, or DICOM tag 0018, 0024 `Sequence Name`

      when the former is not defined (for example, in GE devices.)

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0FieldIdentifier
  B0FieldSource:
    description: 'At least one existing `"B0FieldIdentifier"` defined by images in
      the

      participant''s tree.

      This field states the *B<sub>0</sub> field* estimation designated by the

      `"B0FieldIdentifier"` that may be used to correct the dataset for distortions

      caused by B<sub>0</sub> inhomogeneities.

      `"B0FieldSource"` and `"B0FieldIdentifier"` MAY both be present for images that

      are used to estimate their own B<sub>0</sub> field, for example, in "pepolar"

      acquisitions.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0FieldSource
  B0ShimmingTechnique:
    description: 'The technique used to shim the *B*<sub>0</sub> field (for example,
      `"Dynamic shim updating"`

      or `"FASTMAP"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0ShimmingTechnique
  B1ShimmingTechnique:
    description: 'The technique used to shim the *B*<sub>1</sub> field (for example,
      `"Simple phase align"`

      or `"Pre-saturated TurboFLASH"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B1ShimmingTechnique
  BIDSVersion:
    description: 'The version of the BIDS standard that was used.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BIDSVersion
  BackgroundSuppression:
    description: 'Boolean indicating if background suppression is used.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppression
  BackgroundSuppressionNumberPulses:
    description: 'The number of background suppression pulses used.

      Note that this excludes any effect of background suppression pulses applied

      before the labeling.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppressionNumberPulses
  BackgroundSuppressionPulseTime:
    description: 'Array of numbers containing timing, in seconds,

      of the background suppression pulses with respect to the start of the

      labeling.

      In case of multi-PLD with different background suppression pulse times,

      only the pulse time of the first PLD should be defined.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppressionPulseTime
  BasedOn:
    description: 'List of files in a file collection to generate the map.

      Fieldmaps are also listed, if involved in the processing.

      This field is DEPRECATED, and this metadata SHOULD be recorded in the

      `Sources` field using [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri)

      to distinguish sources from different datasets.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BasedOn
  BloodDensity:
    description: 'Measured blood density. Unit of blood density should be in `"g/mL"`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BloodDensity
  BodyPart:
    description: 'Body part of the organ / body region scanned.

      Corresponds to [DICOM Tag 0018, 0015](http://www.dicomlookup.com/dicomtags/(0018,0015))
      `Body Part Examined`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPart
  BodyPartDetails:
    description: 'Additional details about body part or location (for example: `"corpus
      callosum"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPartDetails
  BodyPartDetailsOntology:
    description: '[URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)
      of ontology used for

      BodyPartDetails (for example: `"https://www.ebi.ac.uk/ols/ontologies/uberon"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPartDetailsOntology
  BolusCutOffDelayTime:
    description: 'Duration between the end of the labeling and the start of the bolus
      cut-off

      saturation pulse(s), in seconds.

      This can be a number or array of numbers, of which the values must be

      non-negative and monotonically increasing, depending on the number of bolus

      cut-off saturation pulses.

      For Q2TIPS, only the values for the first and last bolus cut-off saturation

      pulses are provided.

      Based on [DICOM Tag 0018, 925F](http://www.dicomlookup.com/dicomtags/(0018,925F))

      `ASL Bolus Cut-off Delay Time`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BolusCutOffDelayTime
  BolusCutOffFlag:
    description: 'Boolean indicating if a bolus cut-off technique is used.

      Corresponds to [DICOM Tag 0018, 925C](http://www.dicomlookup.com/dicomtags/(0018,925C))

      `ASL Bolus Cut-off Flag`.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BolusCutOffFlag
  BolusCutOffTechnique:
    description: 'Name of the technique used, for example `"Q2TIPS"`, `"QUIPSS"`,
      `"QUIPSSII"`.

      Corresponds to [DICOM Tag 0018, 925E](http://www.dicomlookup.com/dicomtags/(0018,925E))

      `ASL Bolus Cut-off Technique`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BolusCutOffTechnique
  BrainLocation:
    description: 'Refers to the location in space of the `"TissueOrigin"`.

      Values may be an MNI coordinate,

      a label taken from the

      [Allen Brain Atlas](https://atlas.brain-map.org/atlas?atlas=265297125&plate=\

      112360888&structure=4392&x=40348.15104166667&y=46928.75&zoom=-7&resolution=\

      206.60&z=3),

      or layer to refer to layer-specific gene expression,

      which can also tie up with laminar fMRI.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BrainLocation
  CASLType:
    description: 'Describes if a separate coil is used for labeling.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CASLType
  CalibrationCount:
    description: 'The number of calibrations corresponding to this run.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CalibrationCount
  CalibrationPosition:
    description: 'A list of `[x, y]` coordinates in the `CalibrationUnit`.

      For example, using 5 positions calibration presented on an HD screen,

      it could be `[[960,50],[960,540],[960,1030],[50,540],[1870,540]]`.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CalibrationPosition
  CalibrationType:
    description: 'The type of the calibration procedure executed last.

      For example the `"H3"` for horizontal calibration with 3 positions

      or `"HV9"` for horizontal and vertical calibration with 9 positions,

      or one point calibration.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CalibrationType
  CalibrationUnit:
    description: 'Unit of `"CalibrationPosition"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CalibrationUnit
  CapManufacturer:
    description: 'Name of the cap manufacturer (for example, `"EasyCap"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CapManufacturer
  CapManufacturersModelName:
    description: 'Manufacturer''s designation of the cap model

      (for example, `"actiCAP 64 Ch Standard-2"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CapManufacturersModelName
  CellType:
    description: 'Describes the type of cell analyzed.

      Values SHOULD come from the

      [cell ontology](https://obofoundry.org/ontology/cl.html).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CellType
  ChemicalShiftOffset:
    description: 'The chemical shift at the center of `SpectralWidth` corresponding
      to 0 Hz,

      specified in ppm (for example, `4.65`).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ChemicalShiftOffset
  ChemicalShiftReference:
    description: 'The chemical shift at the transmitter frequency, specified in ppm
      (for example, `2.68`).

      Corresponds to [DICOM Tag 0018, 9053](http://www.dicomlookup.com/dicomtags/(0018,9053))

      `Chemical Shift Reference`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ChemicalShiftReference
  ChunkTransformationMatrix:
    description: '3x3 or 4x4 affine transformation matrix describing spatial chunk
      transformation,

      for 2D and 3D respectively (for examples: `[[2, 0, 0], [0, 3, 0], [0, 0, 1]]`

      in 2D for 2x and 3x scaling along the first and second axis respectively; or

      `[[1, 0, 0, 0], [0, 2, 0, 0], [0, 0, 3, 0], [0, 0, 0, 1]]` in 3D for 2x and
      3x

      scaling along the second and third axis respectively).

      Note that non-spatial dimensions like time and channel are not included in the

      transformation matrix.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ChunkTransformationMatrix
  ChunkTransformationMatrixAxis:
    description: 'Describe the axis of the ChunkTransformationMatrix

      (for examples: `["X", "Y"]` or `["Z", "Y", "X"]`).

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ChunkTransformationMatrixAxis
  Code:
    description: '[URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)

      of the code used to present the stimuli.

      Persistent identifiers such as DOIs are preferred.

      If multiple versions of code may be hosted at the same location,

      revision-specific URIs are recommended.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Code
  CodeMeaning:
    description: 'Text that has meaning to a human and conveys the meaning of the
      term

      Corresponds to [DICOM Tag 0008, 0104](http://www.dicomlookup.com/dicomtags/(0008,0104))

      `Code Meaning`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CodeMeaning
  CodeURL:
    description: URL where the code used to generate the dataset may be found.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CodeURL
  CodeValue:
    description: 'An identifier that is unambiguous within the Coding Scheme

      denoted by Coding Scheme Designator and Coding Scheme Version.

      Corresponds to [DICOM Tag 0008, 0100](http://www.dicomlookup.com/dicomtags/(0008,0100))

      `Code Value`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CodeValue
  CodingSchemeDesignator:
    description: 'The identifier of the coding scheme in which the coded entry is
      defined.

      Corresponds to [DICOM Tag 0008, 0102](http://www.dicomlookup.com/dicomtags/(0008,0102))

      `Coding Scheme Designator`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CodingSchemeDesignator
  CodingSchemeVersion:
    description: 'An identifier of the version of the coding scheme if necessary to
      resolve ambiguity.

      Corresponds to [DICOM Tag 0008, 0103](http://www.dicomlookup.com/dicomtags/(0008,0103))

      `Coding Scheme Version`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CodingSchemeVersion
  CogAtlasID:
    description: '[URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)

      of the corresponding [Cognitive Atlas](https://www.cognitiveatlas.org/)

      Task term.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CogAtlasID
  CogPOID:
    description: '[URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)

      of the corresponding [CogPO](http://www.cogpo.org/) term.

      '
