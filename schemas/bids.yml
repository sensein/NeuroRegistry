      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DecayCorrectionFactor
  DeidentificationMethod:
    description: 'A description of the mechanism or method used to remove the Patient''s
