      or an array of standardized position names (for example, `["Cz", "Pz"]`).

      This field should only be used if a cap was not used.

      If a standard cap was used, then it should be specified in `CapManufacturer`

      and `CapManufacturersModelName` and this field should be set to `"n/a"`

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NIRSPlacementScheme
  NIRSSourceOptodeCount:
    description: 'Number of NIRS sources.

      Corresponds to the number of rows in `optodes.tsv` with type `"source"`.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NIRSSourceOptodeCount
  Name:
    description: 'Name of the dataset.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Name
  Name__GeneratedBy:
    description: 'Name of the pipeline or process that generated the outputs. Use
      `"Manual"` to

      indicate the derivatives were generated by hand, or adjusted manually after
      an

      initial run of an automated pipeline.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Name__GeneratedBy
  NegativeContrast:
    description: '`true` or `false` value specifying whether increasing voxel intensity

      (within sample voxels) denotes a decreased value with respect to the

      contrast suffix.

      This is commonly the case when Cerebral Blood Volume is estimated via

      usage of a contrast agent in conjunction with a T2\* weighted acquisition

      protocol.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NegativeContrast
  NonlinearGradientCorrection:
    description: 'Boolean stating if the image saved has been corrected for gradient

      nonlinearities by the scanner sequence.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NonlinearGradientCorrection
  NumberOfSpectralPoints:
    description: 'The number of complex data points in each recorded transient of
      the detected time-domain MR

      signal, equivalent to the number of points in a single spectrum.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberOfSpectralPoints
  NumberOfTransients:
    description: 'The number of single applications of the pulse sequence recorded
      during an MRS acquisition.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberOfTransients
  NumberOfVolumesDiscardedByScanner:
    description: 'Number of volumes ("dummy scans") discarded by the scanner

      (as opposed to those discarded by the user post hoc)

      before saving the imaging file.

      For example, a sequence that automatically discards the first 4 volumes

      before saving would have this field as 4.

      A sequence that does not discard dummy scans would have this set to 0.

      Please note that the onsets recorded in the `events.tsv` file should always

      refer to the beginning of the acquisition of the first volume in the

      corresponding imaging file - independent of the value of

      `"NumberOfVolumesDiscardedByScanner"` field.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberOfVolumesDiscardedByScanner
  NumberOfVolumesDiscardedByUser:
    description: 'Number of volumes ("dummy scans") discarded by the user before including
      the

      file in the dataset.

      If possible, including all of the volumes is strongly recommended.

      Please note that the onsets recorded in the `events.tsv` file should always

      refer to the beginning of the acquisition of the first volume in the

      corresponding imaging file - independent of the value of

      `"NumberOfVolumesDiscardedByUser"` field.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberOfVolumesDiscardedByUser
  NumberReceiveCoilActiveElements:
    description: 'The number of active RF elements used by the receive coil.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberReceiveCoilActiveElements
  NumberShots:
    description: 'The number of RF excitations needed to reconstruct a slice or volume

      (may be referred to as partition).

      Please mind that this is not the same as Echo Train Length which denotes the

      number of k-space lines collected after excitation in a multi-echo readout.

      The data type array is applicable for specifying this parameter before and

      after the k-space center is sampled.

      Please see

      [`"NumberShots"` metadata field]\

      (SPEC_ROOT/appendices/qmri.md#numbershots-metadata-field)

      in the qMRI appendix for corresponding calculations.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberShots
  NumberTransmitCoilActiveElements:
    description: 'The number of active RF elements used by the transmit coil.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumberTransmitCoilActiveElements
  NumericalAperture:
    description: 'Lens numerical aperture (for example: `1.4`). If the file format
      is OME-TIFF,

      the value MUST be consistent with the `LensNA` OME metadata field.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NumericalAperture
  ORNTChannelCount:
    description: 'Number of orientation channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ORNTChannelCount
  OnsetSource:
    description: 'An existing column name in an corresponding recoding data TSV file
