      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#message
  metabolite_parent_fraction:
    description: 'Parent fraction of the radiotracer (0-1).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#metabolite_parent_fraction
  metabolite_polar_fraction:
