      or bipolar channels on the same grid, strip, or other device).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#group__emg
  handedness:
    description: 'String value indicating one of "left", "right", "ambidextrous".


