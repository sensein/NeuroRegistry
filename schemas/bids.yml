      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#OperatingSystem
  OtherAcquisitionParameters:
    description: 'Description of other relevant image acquisition parameters.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#OtherAcquisitionParameters
  OuterVolumeSuppression:
    description: 'Boolean indicating whether outer-volume suppression was used prior
      to acquisition.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#OuterVolumeSuppression
  PASLType:
    description: 'Type of the labeling pulse of the `PASL` labeling,

      for example `"FAIR"`, `"EPISTAR"`, or `"PICORE"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PASLType
  PCASLType:
    description: 'The type of gradient pulses used in the `control` condition.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PCASLType
  POSChannelCount:
    description: 'Number of position channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#POSChannelCount
  ParallelAcquisitionTechnique:
    description: 'The type of parallel imaging used (for example `"GRAPPA"`, `"SENSE"`).

      Corresponds to [DICOM Tag 0018, 9078](http://www.dicomlookup.com/dicomtags/(0018,9078))

      `Parallel Acquisition Technique`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ParallelAcquisitionTechnique
  ParallelReductionFactorInPlane:
    description: 'The parallel imaging (for instance, GRAPPA) factor in plane.

      Use the denominator of the fraction of k-space encoded for each slice.

      For example, 2 means half of k-space is encoded.

      Corresponds to [DICOM Tag 0018, 9069](http://www.dicomlookup.com/dicomtags/(0018,9069))

      `Parallel Reduction Factor In-plane`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ParallelReductionFactorInPlane
  ParallelReductionFactorOutOfPlane:
    description: 'The parallel imaging (for instance, GRAPPA) factor in the second
      phase encoding dimension of 3D sequences.

      Use the denominator of the fraction of k-space encoded in the second phase encoding
      dimension.

      For example, 2 means half of k-space is encoded.

      Will typically be 1 for 2D sequences, as each slice in a 2D acquisition is usually
      fully encoded.

      `ParallelReductionFactorOutOfPlane` should not be confused with `MultibandAccelerationFactor`,

      as they imply different methods of accelerating the acquisition.

      Corresponds to [DICOM Tag 0018, 9155](http://www.dicomlookup.com/dicomtags/(0018,9155))

      `Parallel Reduction Factor out-of-plane`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ParallelReductionFactorOutOfPlane
  ParentCoordinateSystem:
    description: 'The name of a JSON mapping key that defines the parent (anatomical)
      coordinate system

      in which this child (device) coordinate system is anchored.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ParentCoordinateSystem
  PartialFourier:
    description: 'The fraction of partial Fourier information collected.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PartialFourier
  PartialFourierDirection:
    description: 'The direction where only partial Fourier information was collected.

      Corresponds to [DICOM Tag 0018, 9036](http://www.dicomlookup.com/dicomtags/(0018,9036))

      `Partial Fourier Direction`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PartialFourierDirection
  PharmaceuticalDoseAmount:
    description: 'Dose amount of administered pharmaceutical.

      Corresponds to [DICOM Tag 0018, 0028](http://www.dicomlookup.com/dicomtags/(0018,0028))
      `Intervention Drug Dose`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalDoseAmount
  PharmaceuticalDoseRegimen:
    description: 'Details of the pharmaceutical dose regimen.

      Either adequate description or short-code relating to regimen documented

      elsewhere (for example, `"single oral bolus"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalDoseRegimen
  PharmaceuticalDoseTime:
    description: 'Time of administration of pharmaceutical dose, relative to time
      zero.

      For an infusion, this should be a vector with two elements specifying the

      start and end of the infusion period. For more complex dose regimens,

      the regimen description should be complete enough to enable unambiguous

      interpretation of `"PharmaceuticalDoseTime"`.

      Unit format of the specified pharmaceutical dose time MUST be seconds.

      Corresponds to a combination of DICOM Tags

      [0018, 0027](http://www.dicomlookup.com/dicomtags/(0018,0027)) `Intervention
      Drug Stop Time` and

      [0018, 0035](http://www.dicomlookup.com/dicomtags/(0018,0035)) `Intervention
      Drug Start Time`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalDoseTime
  PharmaceuticalDoseUnits:
    description: 'Unit format relating to pharmaceutical dose

      (for example, `"mg"` or `"mg/kg"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalDoseUnits
  PharmaceuticalName:
    description: 'Name of administered pharmaceutical.

      Note that this is distinct from any radiotracer or contrast agent used in the
      scan protocol.

      This partly matches [DICOM Tag 0018, 0034](http://www.dicomlookup.com/dicomtags/(0018,0034))

      `Intervention Drug Name`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PharmaceuticalName
  PhaseEncodingDirection:
    description: 'The letters `i`, `j`, `k` correspond to the first, second and third
      axis of

      the data in the NIFTI file.

      The polarity of the phase encoding is assumed to go from zero index to

      maximum index unless `-` sign is present

      (then the order is reversed - starting from the highest index instead of

      zero).

      `PhaseEncodingDirection` is defined as the direction along which phase is was

      modulated which may result in visible distortions.

      Note that this is not the same as the DICOM term

      `InPlanePhaseEncodingDirection` which can have `ROW` or `COL` values.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PhaseEncodingDirection
  PhotoDescription:
    description: 'Description of the photo.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PhotoDescription
  PhysioType:
    description: 'Defines the specific type of physiological recording.

      For backwards compatibility, the default value is `"generic"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PhysioType
  PixelSize:
    description: 'A 2- or 3-number array of the physical size of a pixel, either `[PixelSizeX,
      PixelSizeY]`

      or `[PixelSizeX, PixelSizeY, PixelSizeZ]`, where X is the width, Y the height
      and Z the

      depth.

      If the file format is OME-TIFF, these values need to be consistent with `PhysicalSizeX`,

      `PhysicalSizeY` and `PhysicalSizeZ` OME metadata fields, after converting in

      `PixelSizeUnits` according to `PhysicalSizeXunit`, `PhysicalSizeYunit` and

      `PhysicalSizeZunit` OME fields.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PixelSize
  PixelSizeUnits:
    description: 'Unit format of the specified `"PixelSize"`. MUST be one of: `"mm"`
      (millimeter), `"um"`

      (micrometer) or `"nm"` (nanometer).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PixelSizeUnits
  PlasmaAvail:
    description: 'Boolean that specifies if plasma measurements are available.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PlasmaAvail
  PlasmaFreeFraction:
    description: 'Measured free fraction in plasma, meaning the concentration of free
      compound

      in plasma divided by total concentration of compound in plasma

      (Units: 0-100%).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PlasmaFreeFraction
  PlasmaFreeFractionMethod:
    description: 'Method used to estimate free fraction.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PlasmaFreeFractionMethod
  PostLabelingDelay:
    description: 'This is the postlabeling delay (PLD) time, in seconds, after the
      end of the

      labeling (for `"CASL"` or `"PCASL"`) or middle of the labeling pulse

      (for `"PASL"`) until the middle of the excitation pulse applied to the

      imaging slab (for 3D acquisition) or first slice (for 2D acquisition).

      Can be a number (for a single-PLD time series) or an array of numbers

      (for multi-PLD and Look-Locker).

      In the latter case, the array of numbers contains the PLD of each volume,

      namely each `control` and `label`, in the acquisition order.

      Any image within the time-series without a PLD, for example an `m0scan`,

      is indicated by a zero.

      Based on DICOM Tags 0018, 9079 `Inversion Times` and 0018, 0082

      `InversionTime`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PostLabelingDelay
  PowerLineFrequency:
    description: 'Frequency (in Hz) of the power grid at the geographical location
      of the

      instrument (for example, `50` or `60`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PowerLineFrequency
  Preamplification:
    description: 'Amplification built into an EMG bipolar sensor, electrode grid,
      or other device.

      See also Gain.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Preamplification
  PromptRate:
    description: 'Prompt rate for each frame (same units as `Units`, for example,
