      indexes or is correspondent to the `"onset"` column of the present TSV file.

      For example, `"timestamp"` column.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#OnsetSource
  OperatingSystem:
    description: 'Operating system used to run the stimuli presentation software

