    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DatasetType
  DecayCorrectionFactor:
    description: 'Decay correction factor for each frame.

      Corresponds to [DICOM Tag 0054, 1321](http://www.dicomlookup.com/dicomtags/(0054,1321))
