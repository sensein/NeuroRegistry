      [`URI`][uri] with [string][] values.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Container
  ContainerTag:
    description: 'Tag of software container image used to produce the dataset

      '
