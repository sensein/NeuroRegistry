      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DigitizedLandmarks
  DispersionConstant:
    description: 'External dispersion time constant resulting from tubing in default
      unit

      seconds.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DispersionConstant
  DispersionCorrected:
    description: 'Boolean flag specifying whether the blood data have been dispersion-corrected.

      NOTE: not customary for manual samples, and hence should be set to `false`.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DispersionCorrected
  DoseCalibrationFactor:
    description: 'Multiplication factor used to transform raw data (in counts/sec)
      to meaningful unit (Bq/ml).

      Corresponds to [DICOM Tag 0054, 1322](http://www.dicomlookup.com/dicomtags/(0054,1322))

      `Dose Calibration Factor`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DoseCalibrationFactor
  DwellTime:
    description: 'Actual dwell time (in seconds) of the receiver per point in the
      readout

      direction, including any oversampling.

      For Siemens, this corresponds to DICOM field 0019, 1018 (in ns).

      This value is necessary for the optional readout distortion correction of

      anatomicals in the HCP Pipelines.

      It also usefully provides a handle on the readout bandwidth,

      which isn''t captured in the other metadata tags.

      Not to be confused with `"EffectiveEchoSpacing"`, and the frequent mislabeling

      of echo spacing (which is spacing in the phase encoding direction) as

      "dwell time" (which is spacing in the readout direction).

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DwellTime
  ECGChannelCount:
