      For "male", use one of these values: `male`, `m`, `M`, `MALE`, `Male`.


      For "female", use one of these values: `female`, `f`, `F`, `FEMALE`, `Female`.


      For "other", use one of these values: `other`, `o`, `O`, `OTHER`, `Other`.'
    multivalued: false
