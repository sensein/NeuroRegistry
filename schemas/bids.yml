      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ECGChannelCount
  ECOGChannelCount:
    description: 'Number of ECoG channels.

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ECOGChannelCount
  EEGChannelCount:
    description: 'Number of EEG channels recorded simultaneously (for example, `21`).

      '
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGChannelCount
  EEGCoordinateSystem:
    description: 'Defines the coordinate system for the EEG sensors.


      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `EEGCoordinateSystemDescription`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateSystem
  EEGCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the

      system in greater detail.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateSystemDescription
  EEGCoordinateUnits:
    description: 'Units of the coordinates of `EEGCoordinateSystem`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGCoordinateUnits
  EEGGround:
    description: 'Description of the location of the ground electrode

      (for example, `"placed on right mastoid (M2)"`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGGround
  EEGPlacementScheme:
    description: 'Placement scheme of EEG electrodes.

      Either the name of a standardized placement system (for example, `"10-20"`)

      or a list of standardized electrode names (for example, `["Cz", "Pz"]`).

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#EEGPlacementScheme
  EEGReference:
    description: 'General description of the reference scheme used and (when applicable)
      of

      location of the reference electrode in the raw recordings

      (for example, `"left mastoid"`, `"Cz"`, `"CMS"`).

