    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ContainerTag
  ContainerType:
    description: 'Type of software container image used to produce the dataset

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ContainerType
  ContainerURI:
    description: 'URI for software container image used to produce the dataset

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ContainerURI
  ContinuousHeadLocalization:
