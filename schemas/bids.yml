      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReceiveCoilName
  ReceiveGain:
    description: 'The gain of the receive coil.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ReceiveGain
  ReconFilterSize:
    description: 'Kernel size of post-recon filter (FWHM) in default units `"mm"`.

      This partly matches the [DICOM Tag 0018, 1210](http://www.dicomlookup.com/dicomtags/(0018,1210))

