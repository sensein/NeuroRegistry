    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CoilCombinationMethod
  Columns:
    description: 'Names of columns in file.

      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Columns
  Container:
    description: 'Used to specify the location and relevant attributes of software
      container image

      used to produce the dataset. Valid keys in this object include `Type`, `Tag`
