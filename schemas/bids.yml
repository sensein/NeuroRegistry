  Beh:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#beh
    description: Behavioral data.
    slots: []
  Bf:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BF
    description: Bright-field microscopy imaging data
    slots: []
  Blood:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#blood
    description: 'Blood measurements of radioactivity stored in

      [tabular files](SPEC_ROOT/common-principles.md#tabular-files)

      and located in the `pet/` directory along with the corresponding PET data.'
    slots: []
  Bold:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#bold
    description: Blood-Oxygen-Level Dependent contrast (specialized T2\* weighting)
    slots: []
  Cars:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CARS
    description: Coherent anti-Stokes Raman spectroscopy imaging data
    slots: []
  Cbv:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#cbv
    description: Cerebral Blood Volume contrast (specialized T2\* weighting or difference
      between T1 weighted images)
    slots: []
  Channels:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#channels
    description: Channel information.
    slots: []
  Chimap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Chimap
    description: 'In parts per million (ppm).

      QSM allows for determining the underlying magnetic susceptibility of tissue

      (Chi)

      ([Wang & Liu, 2014](https://doi.org/10.1002/mrm.25358)).

      Chi maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  Colfa:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#colFA
    description: 'Scanner-derived parametric map encoding both the anisotropy and
      principal direction of the diffusion tensor.

      Image intensity is proportional to the Fractional Anisotropy (FA) measure;

      image color is determined by the principal eigenvector of the diffusion tensor,

      where red encodes the magnitude of the left-right component of that orientation,

      with green and blue similarly encoding the anterior-posterior and inferior-superior
      components respectively.'
    slots: []
  Conf:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#CONF
    description: Confocal microscopy imaging data
    slots: []
  Coordsystem:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#coordsystem
    description: 'A JSON document specifying the coordinate system(s) used for the
      MEG, EEG,

      head localization coils, and anatomical landmarks.'
    slots: []
  Defacemask:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#defacemask
    description: 'A binary mask that was used to remove facial features from an anatomical
      MRI

      image.'
    slots: []
  Description:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description
    description: 'A JSON file describing the entities that occur in the filename.


      At present, this is used for atlas descriptions.


      This file MUST be located at the root of the dataset.'
    slots: []
  Descriptions:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#descriptions
    description: 'A TSV file describing labels found for the `desc` entity in a Derivatives
      dataset.


      This file MAY be located at the root of the derivative dataset,

      or at the subject or session level.


      The use of `descriptions.tsv` files together with the desc entity are helpful
      to

      document how files are generated,

      even if their use may not be sufficient to provide full computational reproducibility.'
    slots: []
  Df:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DF
    description: Dark-field microscopy imaging data
    slots: []
  Dic:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DIC
    description: Differential interference contrast microscopy imaging data
    slots: []
  Dseg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#dseg
    description: 'A discrete segmentation.


      This suffix may only be used in derivative datasets.'
    slots: []
  Dwi:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#dwi
    description: Diffusion-weighted imaging (DWI).
    slots: []
  Eeg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#eeg
    description: Electroencephalography
    slots: []
  Electrodes:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#electrodes
    description: File that gives the location of (i)EEG or EMG electrodes.
    slots: []
  Emg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#emg
    description: Measurements of muscular activity.
    slots: []
  Epi:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#epi
    description: 'The phase-encoding polarity (PEpolar) technique combines two or
      more Spin Echo

      EPI scans with different phase encoding directions to estimate the underlying

      inhomogeneity/deformation map.'
    slots: []
  Events:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#events
    description: Event timing information from a behavioral task.
    slots: []
  Expadc:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#expADC
    description: 'Exponential ADC / Attenuation Coefficient / Attenuation Factor map,

      as the ratio of trace-weighted to non-diffusion-weighted image intensity'
    slots: []
  Fa:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FA
    description: 'Scanner-generated derivative parametric map

      reflecting the anisotropy of the diffusion tensor'
    slots: []
  Fieldmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#fieldmap
    description: 'Some MR schemes such as spiral-echo imaging (SEI) sequences are
      able to

      directly provide maps of the *B<sub>0</sub>* field inhomogeneity.'
    slots: []
  Flair:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FLAIR
    description: 'In arbitrary units (arbitrary).

      Structural images with predominant T2 contribution (also known as T2-FLAIR),

      in which signal from fluids (for example, CSF) is nulled out by adjusting

      inversion time, coupled with notably long repetition and echo times.'
    slots: []
  Flash:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FLASH
    description: 'FLASH (Fast-Low-Angle-Shot) is a vendor-specific implementation
      for spoiled

      gradient echo acquisition.

      It is commonly used for rapid anatomical imaging and also for many different

      qMRI applications.

      When used for a single file, it does not convey any information about the

      image contrast.

      When used in a file collection, it may result in conflicts across filenames
      of

      different applications.

      **Change:** Removed from suffixes.'
    slots: []
  Fluo:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#FLUO
    description: Fluorescence microscopy imaging data
    slots: []
  Fmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#fmap
    description: MRI scans for estimating B0 inhomogeneity-induced distortions.
    slots: []
  Func:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#func
    description: Task (including resting state) imaging data
    slots: []
  Headshape:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#headshape
    description: 'The 3-D locations of points that describe the head shape and/or
      electrode

      locations can be digitized and stored in separate files.'
    slots: []
  Ieeg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ieeg
    description: Intracranial electroencephalography (iEEG) or electrocorticography
      (ECoG) data
    slots: []
  Inplanet1:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#inplaneT1
    description: 'In arbitrary units (arbitrary).

      T1 weighted structural image matched to a functional (task) image.'
    slots: []
  Inplanet2:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#inplaneT2
    description: 'In arbitrary units (arbitrary).

      T2 weighted structural image matched to a functional (task) image.'
    slots: []
  Irt1:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#IRT1
    description: 'The IRT1 method involves multiple inversion recovery spin-echo images

      acquired at different inversion times

      ([Barral et al. 2010](https://doi.org/10.1002/mrm.22497)).'
    slots: []
  M0map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#M0map
    description: 'In arbitrary units (arbitrary).

      A common quantitative MRI (qMRI) fitting variable that represents the amount

      of magnetization at thermal equilibrium.

      M0 maps are RECOMMENDED to use this suffix if generated by qMRI applications

      (for example, variable flip angle T1 mapping).'
    slots: []
  M0scan:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#m0scan
    description: 'The M0 image is a calibration image, used to estimate the equilibrium

      magnetization of blood.'
    slots: []
  Magnitude:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#magnitude
    description: 'Field-mapping MR schemes such as gradient-recalled echo (GRE) generate
      a

      Magnitude image to be used for anatomical reference.

      Requires the existence of Phase, Phase-difference or Fieldmap maps.'
    slots: []
  Magnitude1:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#magnitude1
    description: 'Magnitude map generated by GRE or similar schemes, associated with
      the first

      echo in the sequence.'
    slots: []
  Magnitude2:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#magnitude2
    description: 'Magnitude map generated by GRE or similar schemes, associated with
      the second

      echo in the sequence.'
    slots: []
  Markers:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#markers
    description: 'Another manufacturer-specific detail pertains to the KIT/Yokogawa/Ricoh

      system, which saves the MEG sensor coil positions in a separate file with two

      possible filename extensions  (`.sqd`, `.mrk`).

      For these files, the `markers` suffix MUST be used.

      For example: `sub-01_task-nback_markers.sqd`'
    slots: []
  Mask:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mask
    description: 'A binary mask that functions as a discrete "label" for a single
      structure.


      This suffix may only be used in derivative datasets.'
    slots: []
  Meg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#meg
    description: Magnetoencephalography
    slots: []
  Megre:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MEGRE
    description: 'Anatomical gradient echo images acquired at different echo times.

      Please note that this suffix is not intended for the logical grouping of

      images acquired using an Echo Planar Imaging (EPI) readout.'
    slots: []
  Mese:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MESE
    description: 'The MESE method involves multiple spin echo images acquired at different
      echo

      times and is primarily used for T2 mapping.

      Please note that this suffix is not intended for the logical grouping of

      images acquired using an Echo Planar Imaging (EPI) readout.'
    slots: []
  Micr:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#micr
    description: Microscopy
    slots: []
  Motion:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#motion
    description: Motion data from a tracking system
    slots: []
  Mp2rage:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MP2RAGE
    description: 'The MP2RAGE method is a special protocol that collects several images
      at

      different flip angles and inversion times to create a parametric T1map by

      combining the magnitude and phase images

      ([Marques et al. 2010](https://doi.org/10.1016/j.neuroimage.2009.10.002)).'
    slots: []
  Mpe:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MPE
    description: Multi-photon excitation microscopy imaging data
    slots: []
  Mpm:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MPM
    description: 'The MPM approaches (a.k.a hMRI) involves the acquisition of highly-similar

      anatomical images that differ in terms of application of a magnetization

      transfer RF pulse (MTon or MToff), flip angle and (optionally) echo time and

      magnitue/phase parts

      ([Weiskopf et al. 2013](https://doi.org/10.3389/fnins.2013.00095)).

      See [here](https://owncloud.gwdg.de/index.php/s/iv2TOQwGy4FGDDZ) for

      suggested MPM acquisition protocols.'
    slots: []
  Mrs:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mrs
    description: Magnetic resonance spectroscopy data
    slots: []
  Mrsi:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mrsi
    description: 'MRS acquisitions where additional imaging gradients are used

      to detect the MR signal from 1, 2, or 3 spatial dimensions.'
    slots: []
  Mrsref:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mrsref
    description: 'An MRS acquisition collected to serve as a concentration reference
      for absolute quantification

      or as a calibration reference for preprocessing (for example, eddy-current correction).'
    slots: []
  Mtr:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MTR
    description: 'This method is to calculate a semi-quantitative magnetization transfer
      ratio

      map.'
    slots: []
  Mtrmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MTRmap
    description: 'In arbitrary units (arbitrary).

      MTR maps are REQUIRED to use this suffix regardless of the method used to

      generate them.

      MTRmap intensity values are RECOMMENDED to be represented in percentage in

      the range of 0-100%.'
    slots: []
  Mts:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MTS
    description: 'This method is to calculate a semi-quantitative magnetization transfer

      saturation index map.

      The MTS method involves three sets of anatomical images that differ in terms

      of application of a magnetization transfer RF pulse (MTon or MToff) and flip

      angle ([Helms et al. 2008](https://doi.org/10.1002/mrm.21732)).'
    slots: []
  Mtsat:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MTsat
    description: 'In arbitrary units (arbitrary).

      MTsat maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  Mtvmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MTVmap
    description: 'In arbitrary units (arbitrary).

      MTV maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  Mwfmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#MWFmap
    description: 'In arbitrary units (arbitrary).

      MWF maps are REQUIRED to use this suffix regardless of the method used to

      generate them.

      MWF intensity values are RECOMMENDED to be represented in percentage in the

      range of 0-100%.'
    slots: []
  Nirs:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#nirs
    description: Near-Infrared Spectroscopy data organized around the SNIRF format
    slots: []
  Nlo:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#NLO
    description: Nonlinear optical microscopy imaging data
    slots: []
  Norf:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#noRF
    description: 'An MR noise scan often acquired alongside another MR scan.


      These noise scans are acquired by disabling the radio frequency excitation,

      while maintaining all other parameters from the associated scan.

      These can be acquired using some other sequence with RF excitation removed

      or as part of sequences that turns off RF at the beginning or end of a run.

      For example a `bold` scan where a few volumes are acquired with RF off.

      There is no consistent DICOM denotation for these scans.


      If multiple sequences with different suffixes but otherwise the same entities
      have `noRF`

      sequences, they SHOULD be disambiguated using the modality entity

      (for example, `mod-bold_noRF.nii.gz` and `mod-cbv_noRF.nii`).


      `noRF` are typically used to estimate properties of the scanner and

      sequence that are independent from the object being imaged.'
    slots: []
  Oct:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#OCT
    description: Optical coherence tomography imaging data
    slots: []
  Optodes:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#optodes
    description: 'Either a light emitting device, sometimes called a transmitter,
      or a photoelectric transducer, sometimes called a

      receiver.'
    slots: []
  Pc:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PC
    description: Phase-contrast microscopy imaging data
    slots: []
  Pd:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PD
    description: 'Ambiguous, may refer to a parametric image or to a conventional
      image.

      **Change:** Replaced by `PDw` or `PDmap`.'
    slots: []
  Pdmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PDmap
    description: 'In arbitrary units (arbitrary).

      PD maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  Pdt2:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PDT2
    description: 'In arbitrary units (arbitrary).

      A two-volume 4D image, where the volumes are, respectively, PDw and T2w

      images acquired simultaneously.

      If separated into 3D volumes, the `PDw` and `T2w` suffixes SHOULD be used instead,

      and an acquisition entity MAY be used to distinguish the images from others
      with

      the same suffix, for example, `acq-PDT2_PDw.nii` and `acq-PDT2_T2w.nii`.'
    slots: []
  Pdw:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PDw
    description: 'In arbitrary units (arbitrary).

      The contrast of these images is mainly determined by spatial variations in

      the spin density (1H) of the imaged specimen.

      This contrast is achieved at short echo times and long repetition times;

      for gradient echo, this weighting is also possible with a short TR (TR<<T1)
      and a small flip angle.'
    slots: []
  Perf:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#perf
    description: Blood perfusion imaging data, including arterial spin labeling (ASL)
    slots: []
  Pet:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#pet
    description: Positron emission tomography data
    slots: []
  Phase:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#phase
    description: '[DEPRECATED](SPEC_ROOT/common-principles.md#definitions).

      Phase information associated with magnitude information stored in BOLD

      contrast.

      This suffix should be replaced by the

      [`part-phase`](SPEC_ROOT/appendices/entities.md#part)

      in conjunction with the `bold` suffix.'
    slots: []
  Phase1:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#phase1
    description: 'Phase map generated by GRE or similar schemes, associated with the
      first

      echo in the sequence.'
    slots: []
  Phase2:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#phase2
    description: 'Phase map generated by GRE or similar schemes, associated with the
      second

      echo in the sequence.'
    slots: []
  Phasediff:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#phasediff
    description: 'Some scanners subtract the `phase1` from the `phase2` map and generate
      a

      unique `phasediff` file.

      For instance, this is a common output for the built-in fieldmap sequence of

      Siemens scanners.'
    slots: []
  Phenotype:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#phenotype
    description: 'Participant level measurement data

      (for example, responses from multiple questionnaires)

      split into individual files separate from `participants.tsv`.'
    slots: []
  Photo:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#photo
    description: Photos of the anatomical landmarks, head localization coils or tissue
      sample.
    slots: []
  Physio:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#physio
    description: Physiological recordings such as cardiac and respiratory signals.
    slots: []
  Physioevents:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#physioevents
    description: 'Event timing information corresponding to physiological recordings
      and other

      asynchronous data such as messages.'
    slots: []
  Pli:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#PLI
    description: Polarized-light microscopy imaging data
    slots: []
  Probseg:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#probseg
    description: 'A probabilistic segmentation.


      This suffix may only be used in derivative datasets.'
    slots: []
  R1map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#R1map
    description: 'In seconds<sup>-1</sup> (1/s).

      R1 maps (R1 = 1/T1) are REQUIRED to use this suffix regardless of the method

      used to generate them.'
    slots: []
  R2map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#R2map
    description: 'In seconds<sup>-1</sup> (1/s).

      R2 maps (R2 = 1/T2) are REQUIRED to use this suffix regardless of the method

      used to generate them.'
    slots: []
  R2starmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#R2starmap
    description: 'In seconds<sup>-1</sup> (1/s).

      R2-star maps (R2star = 1/T2star) are REQUIRED to use this suffix regardless

      of the method used to generate them.'
    slots: []
  Rb1cor:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RB1COR
    description: 'Low resolution images acquired by the body coil

      (in the gantry of the scanner) and the head coil using identical acquisition

      parameters to generate a combined sensitivity map as described in

      [Papp et al. (2016)](https://doi.org/10.1002/mrm.26058).'
    slots: []
  Rb1map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#RB1map
    description: 'In arbitrary units (arbitrary).

      Radio frequency (RF) receive (B1-) sensitivity maps are REQUIRED to use this

      suffix regardless of the method used to generate them.

      RB1map intensity values are RECOMMENDED to be represented as percent

      multiplicative factors such that Amplitude<sub>effective</sub> =

      B1-<sub>intensity</sub>\*Amplitude<sub>ideal</sub>.'
    slots: []
  S0map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#S0map
    description: 'In arbitrary units (arbitrary).

      This represents a model-based estimate of signal intensity

      in the absence of the contrast under investigation.

      For a multi-echo sequence

      (for example, multi-echo spin echo T2 relaxometry or multi-echo fMRI),

      S0 maps index the baseline signal at a hypothetical echo time of zero

      (that is, in the absence of any T2 or T2-star decay).

      In other words: the exponential of the intercept for a linear decay model

      across log-transformed echos. For more information, please see, for example,

      [the tedana documentation](https://tedana.readthedocs.io/en/latest/\

      approach.html#monoexponential-decay-model-fit).

      S0 maps are RECOMMENDED to use this suffix if derived from an ME-FMRI dataset.

      For a diffusion-weighted sequence,

      S0 maps represent the model-based estimate of the signal intensity

      in the absence of any diffusion weighting;

      in other words, the image intensity at *b*=0

      as estimated by a diffusion model fit.'
    slots: []
  Sbref:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#sbref
    description: Single-band reference for one or more multi-band `dwi` images.
    slots: []
  Scans:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#scans
    description: 'The purpose of this file is to describe timing and other properties
      of each imaging acquisition

      sequence (each run file) within one session.

      Each neural recording file SHOULD be described by exactly one row. Some recordings
      consist of

      multiple parts, that span several files, for example through echo-, part-, or
      split- entities.

      Such recordings MUST be documented with one row per file.

      Relative paths to files should be used under a compulsory filename header.

      If acquisition time is included it should be listed under the acq_time header.

      Acquisition time refers to when the first data point in each run was acquired.

      Furthermore, if this header is provided, the acquisition times of all files
      that belong to a

      recording MUST be identical.

      Datetime should be expressed as described in Units.

      Additional fields can include external behavioral measures relevant to the scan.

      For example vigilance questionnaire score administered after a resting state
      scan.

      All such included additional fields SHOULD be documented in an accompanying
      _scans.json file

      that describes these fields in detail (see Tabular files).'
    slots: []
  Sem:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SEM
    description: Scanning electron microscopy imaging data
    slots: []
  Sessions:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#sessions
    description: 'In case of multiple sessions there is an option of adding additional
      sessions.tsv files

      describing variables changing between sessions.

      In such case one file per participant SHOULD be added.

      These files MUST include a session_id column and describe each session by one
      and only one row.

      Column names in sessions.tsv files MUST be different from group level participant
      key column

      names in the participants.tsv file.'
    slots: []
  Spim:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SPIM
    description: Selective plane illumination microscopy imaging data
    slots: []
  Sr:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#SR
    description: Super-resolution microscopy imaging data
    slots: []
  Stim:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#stim
    description: Continuous measures, such as parameters of a film or audio stimulus.
    slots: []
  Svs:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#svs
    description: MRS acquisitions where the detected MR signal is spatially localized
      to a single volume.
    slots: []
  T1map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T1map
    description: 'In seconds (s).

      T1 maps are REQUIRED to use this suffix regardless of the method used to

      generate them.

      See [this interactive book on T1 mapping](https://qmrlab.org/t1_book/intro)

      for further reading on T1-mapping.'
    slots: []
  T1rho:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T1rho
    description: 'In seconds (s).

      T1-rho maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  T1w:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T1w
    description: 'In arbitrary units (arbitrary).

      The contrast of these images is mainly determined by spatial variations in

      the longitudinal relaxation time of the imaged specimen.

      In spin-echo sequences this contrast is achieved at relatively short

      repetition and echo times.

      To achieve this weighting in gradient-echo images, again, short repetition

      and echo times are selected; however, at relatively large flip angles.

      Another common approach to increase T1 weighting in gradient-echo images is

      to add an inversion preparation block to the beginning of the imaging

      sequence (for example, `TurboFLASH` or `MP-RAGE`).'
    slots: []
  T2map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T2map
    description: 'In seconds (s).

      T2 maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  T2star:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T2star
    description: 'Ambiguous, may refer to a parametric image or to a conventional
      image.

      **Change:** Replaced by `T2starw` or `T2starmap`.'
    slots: []
  T2starmap:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T2starmap
    description: 'In seconds (s).

      T2-star maps are REQUIRED to use this suffix regardless of the method used to

      generate them.'
    slots: []
  T2starw:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T2starw
    description: 'In arbitrary units (arbitrary).

      The contrast of these images is mainly determined by spatial variations in

      the (observed) transverse relaxation time of the imaged specimen.

      In spin-echo sequences, this effect is negated as the excitation is followed

      by an inversion pulse.

      The contrast of gradient-echo images natively depends on T2-star effects.

      However, for T2-star variation to dominate the image contrast,

      gradient-echo acquisitions are carried out at long repetition and echo times,

      and at small flip angles.'
    slots: []
  T2w:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#T2w
    description: 'In arbitrary units (arbitrary).

      The contrast of these images is mainly determined by spatial variations in

      the (true) transverse relaxation time of the imaged specimen.

      In spin-echo sequences this contrast is achieved at relatively long

      repetition and echo times.

      Generally, gradient echo sequences are not the most suitable option for

      achieving T2 weighting, as their contrast natively depends on T2-star rather

      than on T2.'
    slots: []
  Tb1afi:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1AFI
    description: 'This method ([Yarnykh 2007](https://doi.org/10.1002/mrm.21120))

      calculates a B1<sup>+</sup> map from two images acquired at interleaved (two)

      TRs with identical RF pulses using a steady-state sequence.'
    slots: []
  Tb1dam:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1DAM
    description: 'The double-angle B1<sup>+</sup> method

      ([Insko and Bolinger 1993](https://doi.org/10.1006/jmra.1993.1133)) is based

      on the calculation of the actual angles from signal ratios,

      collected by two acquisitions at different nominal excitation flip angles.

      Common sequence types for this application include spin echo and echo planar

      imaging.'
    slots: []
  Tb1epi:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1EPI
    description: 'This B1<sup>+</sup> mapping method

      ([Jiru and Klose 2006](https://doi.org/10.1002/mrm.21083)) is based on two

      EPI readouts to acquire spin echo (SE) and stimulated echo (STE) images at

      multiple flip angles in one sequence, used in the calculation of deviations

      from the nominal flip angle.'
    slots: []
  Tb1map:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1map
    description: 'In arbitrary units (arbitrary).

      Radio frequency (RF) transmit (B1+) field maps are REQUIRED to use this

      suffix regardless of the method used to generate them.

      TB1map intensity values are RECOMMENDED to be represented as percent

      multiplicative factors such that FlipAngle<sub>effective</sub> =

      B1+<sub>intensity</sub>\*FlipAngle<sub>nominal</sub> .'
    slots: []
  Tb1rfm:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1RFM
    description: 'The result of a Siemens `rf_map` product sequence.

      This sequence produces two images.

      The first image appears like an anatomical image and the second output is a

      scaled flip angle map.'
    slots: []
  Tb1srge:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1SRGE
    description: 'Saturation-prepared with 2 rapid gradient echoes (SA2RAGE) uses
      a ratio of

      two saturation recovery images with different time delays,

      and a simulated look-up table to estimate B1+

      ([Eggenschwiler et al. 2011](https://doi.org/10.1002/mrm.23145)).

      This sequence can also be used in conjunction with MP2RAGE T1 mapping to

      iteratively improve B1+ and T1 map estimation

      ([Marques & Gruetter 2013](https://doi.org/10.1371/journal.pone.0069294)).'
    slots: []
  Tb1tfl:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TB1TFL
    description: 'The result of a Siemens `tfl_b1_map` product sequence.

      This sequence produces two images.

      The first image appears like an anatomical image and the second output is a

      scaled flip angle map.'
    slots: []
  Tem:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#TEM
    description: Transmission electron microscopy imaging data
    slots: []
  Trace:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#trace
    description: Trace-weighted image, as the mean intensity of diffusion-weighted
      images
    slots: []
  Twope:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#2PE
    description: 2-photon excitation microscopy imaging data
    slots: []
  Uct:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#uCT
    description: Micro-CT imaging data
    slots: []
  Unit1:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#UNIT1
    description: 'In arbitrary units (arbitrary).

      UNIT1 images are REQUIRED to use this suffix regardless of the method used to

      generate them.

      Note that although this image is T1-weighted, regions without MR signal will

      contain white salt-and-pepper noise that most segmentation algorithms will

      fail on.

      Therefore, it is important to dissociate it from `T1w`.

      Please see [`MP2RAGE` specific notes](SPEC_ROOT/appendices/qmri.md#unit1-images)

      in the qMRI appendix for further information.'
    slots: []
  Unloc:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#unloc
    description: 'MRS acquisitions run without localization.

      This includes signals detected using coil sensitivity only.'
    slots: []
  Vfa:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#VFA
    description: 'The VFA method involves at least two spoiled gradient echo (SPGR)
      of

      steady-state free precession (SSFP) images acquired at different flip angles.

      Depending on the provided metadata fields and the sequence type,

      data may be eligible for DESPOT1, DESPOT2 and their variants

      ([Deoni et al. 2005](https://doi.org/10.1002/mrm.20314)).'
    slots: []
  Xpct:
    class_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#XPCT
    description: X-ray phase-contrast tomography imaging data
    slots: []
default_prefix: bids
default_range: string
description: Brain Imaging Data Structure (BIDS) specification schema.
id: https://bids-specification.readthedocs.io/en/stable/
imports:
- linkml:types
license: CC0-1.0
name: bids
prefixes:
  bids: https://bids-specification.readthedocs.io/en/stable/
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  xsd: http://www.w3.org/2001/XMLSchema#
slots:
  columns__HED:
    description: 'Hierarchical Event Descriptor (HED) tags.

      See the [HED Appendix](SPEC_ROOT/appendices/hed.md) for details.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#HED
  columns__abbreviation:
    description: The unique label abbreviation
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#abbreviation
  columns__acq_time__scans:
    description: 'Acquisition time refers to when the first data point in each run
      was acquired.

      Furthermore, if this header is provided, the acquisition times of all files

      from the same recording MUST be identical.

      Datetime format and their deidentification are described in

      [Units](SPEC_ROOT/common-principles.md#units).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#acq_time__scans
  columns__acq_time__sessions:
    description: 'Acquisition time refers to when the first data point of the first
      run was acquired.

      Datetime format and their deidentification are described in

      [Units](SPEC_ROOT/common-principles.md#units).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#acq_time__sessions
  columns__age:
    description: 'Numeric value (float or integer value).

      By default expressed using "year" as the unit. Other possible "Units" are described
      in

      [Units](SPEC_ROOT/common-principles.md#units).


      For privacy purposes, participant ages should be capped at 89 years.

      Using "89+" for ages above 88 is DEPRECATED.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#age
  columns__cardiac:
    description: continuous pulse measurement
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#cardiac
  columns__channel:
    description: 'Channel(s) associated with an event.

      If multiple channels are specified, they MUST be separated by a delimiter

      specified in the `"Delimiter"` field describing the `channel` column.

      For example, channels separated with a comma (`,`) require the `events.json`

      file to contain `"channel": {"Delimiter": ","}`.

      In the absence of a delimiter, tools MUST interpret any character as being part

      of a channel name.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#channel
  columns__color:
    description: Hexadecimal. Label color for visualization.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#color
  columns__component:
    description: 'Description of the spatial axis or label of quaternion component
      associated with the channel.

      For example, `x`,`y`,`z` for position channels,

      or `quat_x`, `quat_y`, `quat_z`, `quat_w` for quaternion orientation channels.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#component
  columns__coordinate_system:
    description: 'Name of the coordinate system defined in `coordsystem.json` in which
      the electrode''s

      `x`, `y`, and (optionally) `z` coordinates are given.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#coordinate_system
  columns__derived_from:
    description: '`sample-<label>` entity from which a sample is derived,

      for example a slice of tissue (`sample-02`) derived from a block of tissue (`sample-01`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#derived_from
  columns__desc_id:
    description: 'A `desc-<label>` entity present in the derivatives dataset.


      The `desc_id` column contains the labels used with the

      [`desc` entity](SPEC_ROOT/appendices/entities.md#desc),

      within the particular nesting that the `descriptions.tsv` file is placed.


      For example, if the `descriptions.tsv` file is placed at the root of the derivative
      dataset,

      its `desc_id` column SHOULD contain all labels of the `desc` entity)

      used across the entire derivative dataset.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#desc_id
  columns__description:
    description: Brief free-text description of the channel, or other information
      of interest.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description
  columns__description__entities:
    description: Free-form text description of the entity's label (defined in `<entity>_id`
      column).
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description__entities
  columns__description__optode:
    description: Free-form text description of the optode, or other information of
      interest.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description__optode
  columns__detector__channels:
    description: 'Name of the detector as specified in the `*_optodes.tsv` file.

      `n/a` for channels that do not contain NIRS signals (for example, acceleration).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#detector__channels
  columns__detector_type:
    description: The type of detector. Only to be used if the field `DetectorType`
      in `*_nirs.json` is set to `mixed`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#detector_type
  columns__dimension:
    description: 'Size of the group (grid/strip/probe) that this electrode belongs
      to.

      Must be of form `[AxB]` with the smallest dimension first (for example, `[1x8]`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#dimension
  columns__duration:
    description: 'Duration of the event (measured from onset) in seconds.

      Must always be either zero or positive (or `n/a` if unavailable).

      A "duration" value of zero implies that the delta function or event is so

      short as to be effectively modeled as an impulse.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#duration
  columns__filename:
    description: Relative paths to files.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#filename
  columns__group__channel:
    description: 'Which group of channels (grid/strip/seeg/depth) this channel belongs
      to.

      This is relevant because one group has one cable-bundle and noise can be shared.

      This can be a name or number.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#group__channel
  columns__group__emg:
    description: 'Which group the electrode or channel belongs to (typically this
      indicates electrodes

      or bipolar channels on the same grid, strip, or other device).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#group__emg
  columns__handedness:
    description: 'String value indicating one of "left", "right", "ambidextrous".


      For "left", use one of these values: `left`, `l`, `L`, `LEFT`, `Left`.


      For "right", use one of these values: `right`, `r`, `R`, `RIGHT`, `Right`.


      For "ambidextrous", use one of these values: `ambidextrous`, `a`, `A`, `AMBIDEXTROUS`,

      `Ambidextrous`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#handedness
  columns__hemisphere:
    description: The hemisphere in which the electrode is placed.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#hemisphere
  columns__high_cutoff:
    description: 'Frequencies used for the low-pass filter applied to the channel
      in Hz.

      If no low-pass filter applied, use `n/a`.

      Note that hardware anti-aliasing in A/D conversion of all MEG/EEG/EMG electronics

      applies a low-pass filter; specify its frequency here if applicable.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#high_cutoff
  columns__hplc_recovery_fractions:
    description: HPLC recovery fractions (the fraction of activity that gets loaded
      onto the HPLC).
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#hplc_recovery_fractions
  columns__impedance:
    description: Impedance of the electrode, units MUST be in `kOhm`.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#impedance
  columns__index:
    description: The label integer index.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#index
  columns__interelectrode_distance:
    description: 'Distance between adjacent electrodes (in a pair or grid) that are
      rigidly attached to

      the same sensor device, or between the `signal_electrode` and its `reference`

      when each is independently placed.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#interelectrode_distance
  columns__low_cutoff:
    description: 'Frequencies used for the high-pass filter applied to the channel
      in Hz.

      If no high-pass filter applied, use `n/a`.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#low_cutoff
  columns__manufacturer:
    description: 'The manufacturer for each electrode.

      Can be used if electrodes were manufactured by more than one company.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#manufacturer
  columns__mapping:
    description: Corresponding integer label in the standard BIDS label lookup.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mapping
  columns__material:
    description: Material of the electrode (for example, `Tin`, `Ag/AgCl`, `Gold`).
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#material
  columns__message:
    description: 'Brief free-text description of a message (for example in a log generated

      by a device), or other information of interest.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#message
  columns__metabolite_parent_fraction:
    description: Parent fraction of the radiotracer (0-1).
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#metabolite_parent_fraction
  columns__metabolite_polar_fraction:
    description: Polar metabolite fraction of the radiotracer (0-1).
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#metabolite_polar_fraction
  columns__name__channels:
    description: Label of the channel.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#name__channels
  columns__name__electrodes:
    description: Name of the electrode contact point.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#name__electrodes
  columns__name__optodes:
    description: Name of the optode, must be unique.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#name__optodes
  columns__name__segmentations:
    description: The unique label name.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#name__segmentations
  columns__notch:
    description: 'Frequencies used for the notch filter applied to the channel, in
      Hz.

      If notch filters are applied at multiple frequencies,

      these frequencies MAY be specified as a list,

      for example, `[60, 120, 180]`.

      If no notch filter was applied, use `n/a`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#notch
  columns__onset:
    description: 'Onset (in seconds) of the event, measured from the beginning of
      the acquisition

      of the first data point stored in the corresponding task data file.

      Negative onsets are allowed, to account for events that occur prior to the first

      stored data point.

      For example, in case there is an in-scanner training phase that begins before

      the scanning sequence has started events from this sequence should have

      negative onset time counting down to the beginning of the acquisition of the

      first volume.


      If any data points have been discarded before forming the data file

      (for example, "dummy volumes" in BOLD fMRI),

      a time of 0 corresponds to the first stored data point and not the first

      acquired data point.


      A value of `n/a` value indicates the onset time is unknown or unavailable.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#onset
  columns__onset__physioevents:
    description: 'Onset of the event relative to the timeline defined by the corresponding

      physiological recording file.


      Typically, it will correspond to a timestamp issued by the recording device.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#onset__physioevents
  columns__participant_id:
    description: 'A participant identifier of the form `sub-<label>`,

      matching a participant entity found in the dataset.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#participant_id
  columns__pathology:
    description: 'String value describing the pathology of the sample or type of control.

      When different from `healthy`, pathology SHOULD be specified.

      The pathology may be specified in either `samples.tsv` or

      `sessions.tsv`, depending on whether the pathology changes over time.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#pathology
  columns__placement__motion:
    description: 'Placement of the tracked point on the body (for example,

      participant, avatar centroid, torso, left arm).

      It can refer to an external vocabulary for describing body parts.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#placement__motion
  columns__placement_description:
    description: 'Additional details of the approach to EMG sensor placement.

      See description of the `EMGPlacementSchemeDescription` field in `*_emg.json`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#placement_description
  columns__placement_scheme:
    description: 'A description of the electrode placement procedure used.

      See description of the `EMGPlacementScheme` field in `*_emg.json`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#placement_scheme
  columns__plasma_radioactivity:
    description: Radioactivity in plasma, in unit of plasma radioactivity (for example,
      `kBq/mL`).
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#plasma_radioactivity
  columns__pupil_size:
    description: 'Pupil size, as area or diameter, of the recorded eye, in the

      units specified in the corresponding metadata sidecar.

      It is RECOMMENDED to indicate the particular type of pupil size that is

      being recorded in the `Description` field of this column.

      It is RECOMMENDED to specify the `Units` field corresponding to this column.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#pupil_size
  columns__reference__eeg:
    description: 'Name of the reference electrode(s).

      This column is not needed when it is common to all channels.

      In that case the reference electrode(s) can be specified in `*_eeg.json` as
      `EEGReference`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#reference__eeg
  columns__reference__emg:
    description: 'The reference for the given channel.

      When the reference is an electrode in `*_electrodes.tsv`, use the name of that
      electrode.

      For channels originating from bipolar devices, use `"bipolar"`.

      For non-EMG channels (for example, trigger channels, microphones) use `"n/a"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#reference__emg
  columns__reference__ieeg:
    description: 'Specification of the reference (for example, `mastoid`, `ElectrodeName01`,
      `intracranial`, `CAR`, `other`, `n/a`).

      If the channel is not an electrode channel (for example, a microphone channel)
      use `n/a`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#reference__ieeg
  columns__reference_frame:
    description: 'Specification of a reference frame in which the motion data are
      to be interpreted.

      The description of the levels in `*_channels.json` SHOULD use `RotationRule`,

      `RotationOrder`, and `SpatialAxes`, and MAY use `Description` for the specification.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#reference_frame
  columns__respiratory:
    description: continuous breathing measurement
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#respiratory
  columns__response_time:
    description: 'Response time measured in seconds.

      A negative response time can be used to represent preemptive responses and

      `n/a` denotes a missed response.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#response_time
  columns__sample_id:
