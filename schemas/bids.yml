      '
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DeidentificationMethodCodeSequence
  DelayAfterTrigger:
    description: 'Duration (in seconds) from trigger delivery to scan onset.

      This delay is commonly caused by adjustments and loading times.

      This specification is entirely independent of

      `"NumberOfVolumesDiscardedByScanner"` or `"NumberOfVolumesDiscardedByUser"`,

      as the delay precedes the acquisition.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DelayAfterTrigger
  DelayTime:
    description: 'User specified time (in seconds) to delay the acquisition of data
      for the

      following volume.

      If the field is not present it is assumed to be set to zero.

      Corresponds to Siemens CSA header field `lDelayTimeInTR`.

      This field is REQUIRED for sparse sequences using the `"RepetitionTime"` field

      that do not have the `"SliceTiming"` field set to allowed for accurate

      calculation of "acquisition time".

      This field is mutually exclusive with `"VolumeTiming"`.

      '
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DelayTime
  Delimiter:
    description: 'If rows in a column may be interpreted as a lists of values, the
      character that

      separates one value from the next.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Delimiter
  Density:
    description: 'Specifies the interpretation of the density keyword.

      If an object is used, then the keys should be values for the `den` entity

      and values should be descriptions of those `den` values.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Density
  Derivative:
    description: 'Indicates that values in the corresponding column are transformations
      of values

      from other columns (for example a summary score based on a subset of items in
      a

      questionnaire).

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Derivative
  DerivedFrom:
    description: 'Indicate what data modality the atlas was derived from; for example,
      "cytoarchitecture", "resting-state", or "task".

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DerivedFrom
  Description:
    description: 'Free-form natural language description.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Description
  Description__GeneratedBy:
    description: 'Plain-text description of the pipeline or process that generated
      the outputs.

      RECOMMENDED if `Name` is `"Manual"`.

      '
    multivalued: false
