    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Descriptors
  DetectorType:
    description: 'Type of detector. This is a free form description with the following
      suggested terms:

      `"SiPD"`, `"APD"`. Preferably a specific model/part number is supplied.

      If individual channels have different `DetectorType`,

      then the field here should be specified as `"mixed"`

      and this column should be included in `optodes.tsv`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DetectorType
  DeviceSerialNumber:
    description: 'The serial number of the equipment that produced the measurements.

      A pseudonym can also be used to prevent the equipment from being

      identifiable, so long as each pseudonym is unique within the dataset.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DeviceSerialNumber
  DewarPosition:
    description: 'Position of the dewar during the MEG scan:

      `"upright"`, `"supine"` or `"degrees"` of angle from vertical:

      for example on CTF systems, `"upright=15°, supine=90°"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DewarPosition
  DigitizedHeadPoints:
    description: '`true` or `false` value indicating whether head points outlining
      the

      scalp/face surface are contained within this recording.

      '
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DigitizedHeadPoints
  DigitizedHeadPointsCoordinateSystem:
    description: 'Defines the coordinate system for the digitized head points.

      See the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `"DigitizedHeadPointsCoordinateSystemDescription"`.

      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#DigitizedHeadPointsCoordinateSystem
  DigitizedHeadPointsCoordinateSystemDescription:
