    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template_y
  columns__template_z:
    description: Assumed or ideal position along the z axis.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template_z
  columns__time:
    description: 'Time, in seconds, relative to `TimeZero` defined by the `*_pet.json`.

      For example, 5.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#time
  columns__timestamp__eyetrack:
    description: 'Timestamp issued by the eye-tracker indexing the continuous recordings
      corresponding to

      the sampled eye.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#timestamp__eyetrack
  columns__tracked_point__channels:
    description: 'Label of the point that is being tracked, for example, label of
      a tracker

      or a marker (for example,`"LeftFoot"`, `"RightWrist"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#tracked_point__channels
  columns__trial_type:
    description: 'Primary categorisation of each trial to identify them as instances
      of the

      experimental conditions.

      For example: for a response inhibition task, it could take on values `go` and

      `no-go` to refer to response initiation and response inhibition experimental

      conditions.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#trial_type
  columns__trigger:
    description: continuous measurement of the scanner trigger signal
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#trigger
  columns__type__channels:
    description: 'Type of channel; MUST use the channel types listed below.

      Note that the type MUST be in upper-case.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#type__channels
  columns__type__electrodes:
    description: Type of the electrode (for example, cup, ring, clip-on, wire, needle).
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#type__electrodes
  columns__type__optodes:
    description: The type of the optode.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#type__optodes
  columns__units:
    description: 'Physical unit of the value represented in this channel,

      for example, `V` for Volt, or `fT/cm` for femto Tesla per centimeter

      (see [Units](SPEC_ROOT/common-principles.md#units)).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#units
  columns__units__motion:
    description: 'Physical or virtual unit of the value represented in this channel,

      for example, ''"rad"'' or ''"deg"'' for angular quantities or ''"m"'' for position
      data.

      If motion data is recorded in a virtual space and deviate from standard SI units,

      the unit used MUST be specified in the sidecar `*_motion.json`

      file (for example `"vm"` for virtual meters). `"rad"` is used for Euler angles

      and `"n/a"` for quaternions.

      For guidelines about units see the [Appendix](SPEC_ROOT/appendices/units.md)

      and [Common Principles](SPEC_ROOT/common-principles.md#units) pages.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#units__motion
  columns__units__nirs:
    description: 'Physical unit of the value represented in this channel,

      specified according to the SI unit symbol and possibly prefix symbol,

      or as a derived SI unit (for example, `V`, or unitless for changes in optical
      densities).

      For guidelines about units see the [Appendix](SPEC_ROOT/appendices/units.md)

      and [Common Principles](SPEC_ROOT/common-principles.md#units) pages.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#units__nirs
  columns__volume_type:
    description: 'The `*_aslcontext.tsv` table consists of a single column of labels
      identifying

      the `volume_type` of each volume in the corresponding `*_asl.nii[.gz]` file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#volume_type
  columns__wavelength_actual:
    description: 'Measured wavelength of light in nm.

      `n/a` for channels that do not contain raw NIRS signals (acceleration).

      This field is equivalent to `measurementList.wavelengthActual` in the SNIRF
      specification.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#wavelength_actual
  columns__wavelength_emission_actual:
    description: 'Measured emission wavelength of light in nm.

      `n/a` for channels that do not contain raw NIRS signals (acceleration).

      This field is equivalent to `measurementList.wavelengthEmissionActual` in the
      SNIRF specification.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#wavelength_emission_actual
  columns__wavelength_nominal:
    description: 'Specified wavelength of light in nm.

      `n/a` for channels that do not contain raw NIRS signals (for example, acceleration).

      This field is equivalent to `/nirs(i)/probe/wavelengths` in the SNIRF specification.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#wavelength_nominal
  columns__whole_blood_radioactivity:
    description: 'Radioactivity in whole blood samples,

      in unit of radioactivity measurements in whole blood samples (for example, `kBq/mL`).'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#whole_blood_radioactivity
  columns__x:
    description: Recorded position along the x-axis.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#x
  columns__x__optodes:
    description: 'Recorded position along the x-axis.

      `"n/a"` if not available.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#x__optodes
  columns__x_coordinate:
    description: 'Gaze position x-coordinate of the recorded eye, in the coordinate

      units specified in the corresponding metadata sidecar.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#x_coordinate
  columns__y:
    description: Recorded position along the y-axis.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#y
  columns__y__optodes:
    description: 'Recorded position along the y-axis.

      `"n/a"` if not available.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#y__optodes
  columns__y_coordinate:
    description: 'Gaze position y-coordinate of the recorded eye, in the coordinate

      units specified in the corresponding metadata sidecar.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#y_coordinate
  columns__z:
    description: Recorded position along the z-axis.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#z
  columns__z__optodes:
    description: 'Recorded position along the z-axis.

      `"n/a"` if not available.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#z__optodes
  entities__acquisition:
    description: 'The `acq-<label>` entity corresponds to a custom label the user
      MAY use to distinguish

      a different set of parameters used for acquiring the same modality.


      For example, this should be used when a study includes two T1w images -

      one full brain low resolution and one restricted field of view but high resolution.

      In such case two files could have the following names:

      `sub-01_acq-highres_T1w.nii.gz` and `sub-01_acq-lowres_T1w.nii.gz`;

      however, the user is free to choose any other label than `highres` and `lowres`
      as long

      as they are consistent across subjects and sessions.


      In case different sequences are used to record the same modality

      (for example, `RARE` and `FLASH` for T1w)

      this field can also be used to make that distinction.

      The level of detail at which the distinction is made

      (for example, just between `RARE` and `FLASH`, or between `RARE`, `FLASH`, and
      `FLASHsubsampled`)

      remains at the discretion of the researcher.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#acquisition
  entities__atlas:
    description: The `atlas-<label>` entity identifies files that are part of, or
      derived from, an atlas.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#atlas
  entities__ceagent:
    description: 'The `ce-<label>` entity can be used to distinguish sequences using
      different contrast enhanced images.

      The label is the name of the contrast agent.


      This entity represents the `"ContrastBolusIngredient"` metadata field.

      Therefore, if the `ce-<label>` entity is present in a filename,

      `"ContrastBolusIngredient"` MAY also be added in the JSON file, with the same
      label.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ceagent
  entities__chunk:
    description: 'The `chunk-<index>` key/value pair is used to distinguish between
      images of

      the same physical sample with different fields of view acquired in the same

      imaging experiment.

      This entity applies to collections of 2D images, 3D volumes or 4D volume series

      (for example, diffusion weighted images), and may be used to indicate different

      anatomical structures or regions of the same structure.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#chunk
  entities__cohort:
    description: 'A set of subjects sharing one or more common characteristics.


      In the context of a template, the `cohort-<label>` entity identifies a subset
      of

      subjects or sessions that were used to construct template variations.

      For example, a developmental template may use scans from participants of different
      ages,

      longitudinal sessions of the same participants, or a combination of the two.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#cohort
  entities__density:
    description: 'Density of non-parametric surfaces.


      This entity represents the `"Density"` metadata field.

      Therefore, if the `den-<label>` entity is present in a filename,

      `"Density"` MUST also be added in the JSON file, to provide interpretation.


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#density
  entities__description:
    description: 'When necessary to distinguish two files that do not otherwise have
      a

      distinguishing entity, the `desc-<label>` entity SHOULD be used.


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#description
  entities__direction:
    description: 'The `dir-<label>` entity can be set to an arbitrary legitimate label

      (for example, `dir-LR` or `dir-AP`)

      to distinguish different phase-encoding directions.


      This entity represents the `"PhaseEncodingDirection"` metadata field.

      Therefore, if the `dir-<label>` entity is present in a filename,

      `"PhaseEncodingDirection"` MUST be defined in the associated metadata.


      Labels need not follow any particular convention and in case of conflict,

      JSON metadata MUST take precedence in interpreting an image.


      For example, `dir-j0` and `dir-j1` can indicate `"PhaseEncodingDirection": "j"`
      and `"j-"` (or vice versa),

      identifying the phase-encoding axis while avoiding indicating polarity.

      However, in case of a dataset indicating `dir-j0` with `"PhaseEncodingDirection":
      "i"`, the

      JSON metadata overrides the entity `dir-` setting.


      The use of generic labels, such as `dir-reference` and `dir-reversed`, is RECOMMENDED

      to avoid any possible inconsistency.


      To avoid inconsistency, if the `<label>` is `AP`, `PA`, `LR`, `RL`, `SI`, or
      `IS`,

      then the `"PhaseEncodingDirection"` SHOULD correspond to the data

      axis that most closely aligns with the cardinal direction and orientation.

      For example, `dir-PA` and `dir-AP` for an image in RAS+ orientation SHOULD have

      `"PhaseEncodingDirection": "j"` and `"j-"`, respectively.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#direction
  entities__echo:
    description: 'If files belonging to an entity-linked file collection are acquired
      at different

      echo times, the `echo-<index>` entity MUST be used to distinguish individual
      files.


      This entity represents the `"EchoTime"` metadata field.

      Therefore, if the `echo-<index>` entity is present in a filename,

      `"EchoTime"` MUST be defined in the associated metadata.

      Please note that the `<index>` denotes the number/index (in the form of a nonnegative
      integer),

      not the `"EchoTime"` value of the separate JSON file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#echo
  entities__flip:
    description: 'If files belonging to an entity-linked file collection are acquired
      at different

      flip angles, the `_flip-<index>` entity pair MUST be used to distinguish

      individual files.


      This entity represents the `"FlipAngle"` metadata field.

      Therefore, if the `flip-<index>` entity is present in a filename,

      `"FlipAngle"` MUST be defined in the associated metadata.

      Please note that the `<index>` denotes the number/index (in the form of a nonnegative
      integer),

      not the `"FlipAngle"` value of the separate JSON file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#flip
  entities__hemisphere:
    description: 'The `hemi-<label>` entity indicates which hemibrain is described
      by the file.

      Allowed label values for this entity are `L` and `R`, for the left and right

      hemibrains, respectively.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#hemisphere
  entities__inversion:
    description: 'If files belonging to an entity-linked file collection are acquired
      at different inversion times,

      the `inv-<index>` entity MUST be used to distinguish individual files.


      This entity represents the `"InversionTime"` metadata field.

      Therefore, if the `inv-<index>` entity is present in a filename,

      `"InversionTime"` MUST be defined in the associated metadata.

      Please note that the `<index>` denotes the number/index (in the form of a nonnegative
      integer),

      not the `"InversionTime"` value of the separate JSON file.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#inversion
  entities__label:
    description: 'Tissue-type label, following a prescribed vocabulary.

      Applies to binary masks and probabilistic/partial volume segmentations

      that describe a single tissue type.


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#label
  entities__modality:
    description: 'The `mod-<label>` entity corresponds to modality label for defacing

      masks, for example, T1w, inplaneT1, referenced by a defacemask image.

      For example, `sub-01_mod-T1w_defacemask.nii.gz`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#modality
  entities__mtransfer:
    description: 'If files belonging to an entity-linked file collection are acquired
      at different

      magnetization transfer (MT) states, the `_mt-<label>` entity MUST be used to

      distinguish individual files.


      This entity represents the `"MTState"` metadata field.

      Therefore, if the `mt-<label>` entity is present in a filename,

      `"MTState"` MUST be defined in the associated metadata.

      Allowed label values for this entity are `on` and `off`,

      for images acquired in presence and absence of an MT pulse, respectively.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#mtransfer
  entities__nucleus:
    description: 'The `nuc-<label>` entity can be used to distinguish acquisitions
      tuned

      to detect different nuclei.

      The label is the name of the nucleus or nuclei, which corresponds to DICOM Tag
      `0018, 9100`.

      If present in the filename, `"ResonantNucleus"` MUST also be included in

      the associated metadata.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#nucleus
  entities__part:
    description: 'This entity is used to indicate which component of the complex

      representation of the MRI signal is represented in voxel data.

      The `part-<label>` entity is associated with the DICOM Tag

      `0008, 9208`.

      Allowed label values for this entity are `phase`, `mag`, `real` and `imag`,

      which are typically used in `part-mag`/`part-phase` or

      `part-real`/`part-imag` pairs of files.


      Phase images MAY be in radians or in arbitrary units.

      The sidecar JSON file MUST include the `"Units"` of the `phase` image.

      The possible options are `"rad"` or `"arbitrary"`.


      When there is only a magnitude image of a given type, the `part` entity MAY
      be

      omitted.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#part
  entities__processing:
    description: 'The proc label is analogous to rec for MR and denotes a variant
      of

      a file that was a result of particular processing performed on the device.


      This is useful for files produced in particular by Neuromag/Elekta/MEGIN''s

      MaxFilter (for example, `sss`, `tsss`, `trans`, `quat` or `mc`),

      which some installations impose to be run on raw data because of active

      shielding software corrections before the MEG data can actually be

      exploited.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#processing
  entities__reconstruction:
    description: 'The `rec-<label>` entity can be used to distinguish different reconstruction
      algorithms

      (for example, `MoCo` for the ones using motion correction).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#reconstruction
  entities__recording:
    description: 'The `recording-<label>` entity can be used to distinguish continuous
      recording files.


      This entity is commonly applied when continuous recordings are from different
      acquisition instruments,

      or have different sampling frequencies or start times.

      For example, physiological recordings with different sampling frequencies may
      be distinguished using

      labels like `recording-100Hz` and `recording-500Hz`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#recording
  entities__resolution:
    description: 'Resolution of regularly sampled N-dimensional data.


      This entity represents the `"Resolution"` metadata field.

      Therefore, if the `res-<label>` entity is present in a filename,

      `"Resolution"` MUST also be added in the JSON file, to provide interpretation.


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#resolution
  entities__run:
    description: 'The `run-<index>` entity is used to distinguish separate data acquisitions
      with the same acquisition parameters

      and (other) entities.


      If several data acquisitions (for example, MRI scans or EEG recordings)

      with the same acquisition parameters are acquired in the same session,

      they MUST be indexed with the [`run-<index>`](SPEC_ROOT/appendices/entities.md#run)
      entity:

      `_run-1`, `_run-2`, `_run-3`, and so on

      (only nonnegative integers are allowed as run indices).


      If different entities apply,

      such as a different session indicated by [`ses-<label>`](SPEC_ROOT/appendices/entities.md#ses),

      or different acquisition parameters indicated by

      [`acq-<label>`](SPEC_ROOT/appendices/entities.md#acq),

      then `run` is not needed to distinguish the scans and MAY be omitted.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#run
  entities__sample:
    description: 'A sample pertaining to a subject such as tissue, primary cell or
      cell-free sample.

      The `sample-<label>` entity is used to distinguish between different samples
      from the same subject.

      The label MUST be unique per subject and is RECOMMENDED to be unique throughout
      the dataset.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#sample
  entities__scale:
    description: 'The `scale-<label>` key/value pair corresponds to a custom label
      the user

      MAY use to distinguish segmentations that entail different levels of

      *regional resolution* (scales), often indicated by the number of ROIs.

      See ([Bijsterbosch et al., 2020](https://doi.org/10.1038/s41593-020-00726-z))

      for further details on *regional resolution* or, as defined by the authors of

      the manuscript, the *brain units*.


      For example, the [Schaefer 2018 atlas](https://doi.org/10.1093/cercor/bhx179)

      is distributed within *FreeSurfer* with ten different scales

      (100, 200, 300, 400, 500, 600, 700, 800, 900, and 1000 regions) for each of

      its three different parcellations (*7 networks*, *17 networks*, and

      *Kong''s variation of 17 networks*).


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#scale
  entities__segmentation:
    description: 'The `seg-<label>` key/value pair corresponds to a custom label the
      user

      MAY use to distinguish specific partitions of the data space

      (segmentations or parcellations).


      Segmentations and parcellations MAY or MAY NOT be associated with

      [atlases](SPEC_ROOT/common-principles.md#definitions).

      Therefore, `seg-<label>` SHOULD NOT be used to designate

      [atlases](SPEC_ROOT/common-principles.md#definitions).

      Please refer to the [template and atlas section](SPEC_ROOT/derivatives/atlas.md)

      for detailed specifications on their combined use.

      When a segmentation is a *realization* of an atlas'' segmentation or parcellation,

      `seg-<label>` SHOULD be employed to distinguish them.

      For example, the [Yeo 2011 atlas](https://doi.org/10.1152/jn.00338.2011)

      is distributed within *FreeSurfer* with two different parcellations:

      the *7 networks* MAY be described with `seg-7n`, for instance, and

      the *17 networks* MAY correspondingly be described with `seg-17n`.


      This entity is only applicable to derivative data.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#segmentation
  entities__session:
    description: 'A logical grouping of neuroimaging and behavioral data consistent
      across subjects.

      Session can (but doesn''t have to) be synonymous to a visit in a longitudinal
      study.

      In general, subjects will stay in the scanner during one session.

      However, for example, if a subject has to leave the scanner room and then

      be re-positioned on the scanner bed, the set of MRI acquisitions will still

      be considered as a session and match sessions acquired in other subjects.

      Similarly, in situations where different data types are obtained over

      several visits (for example fMRI on one day followed by DWI the day after)

      those can be grouped in one session.


      Defining multiple sessions is appropriate when several identical or similar

      data acquisitions are planned and performed on all -or most- subjects,

      often in the case of some intervention between sessions

      (for example, training).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#session
  entities__space:
    description: 'The `space-<label>` entity indicates the coordinate system for interpreting

      spatial coordinates.

      For sensor-based modalities, such as EEG/MEG/iEEG,

      the space indicates how sensor positions are reported;

      for imaging modalities,

      the space indicates a reference image to which a file has been aligned.

      A list of common spaces is defined in the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md),

      and these SHOULD be used as `<label>` values for data reported in those

      spaces.


      Note that the space entity is broadly applicable to derivative data,

      but is only defined for a subset of raw data types.

      For particular use cases, `<label>` may be restricted to a set of enumerated
      values.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#space
  entities__split:
    description: 'In the case of long data recordings that exceed a file size of 2Gb,

      `.fif` files are conventionally split into multiple parts.

      Each of these files has an internal pointer to the next file.

      This is important when renaming these split recordings to the BIDS convention.


      Instead of a simple renaming, files should be read in and saved under their

      new names with dedicated tools like [MNE-Python](https://mne.tools/),

      which will ensure that not only the filenames, but also the internal file pointers,
      will be updated.


      It is RECOMMENDED that `.fif` files with multiple parts use the `split-<index>`
      entity to indicate each part.

      If there are multiple parts of a recording and the optional `scans.tsv` is provided,

      all files MUST be listed separately in `scans.tsv` and

      the entries for the `acq_time` column in `scans.tsv` MUST all be identical,

      as described in [Scans file](SPEC_ROOT/modality-agnostic-files/data-summary-files.md#scans-file).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#split
  entities__stain:
    description: 'The `stain-<label>` key/pair values can be used to distinguish image
      files

      from the same sample using different stains or antibodies for contrast enhancement.


      This entity represents the `"SampleStaining"` metadata field.

      Therefore, if the `stain-<label>` entity is present in a filename,

      `"SampleStaining"` SHOULD be defined in the associated metadata,

      although the label may be different.


      Descriptions of antibodies SHOULD also be indicated in the `"SamplePrimaryAntibodies"`

      and/or `"SampleSecondaryAntibodies"` metadata fields, as appropriate.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#stain
  entities__subject:
    description: A person or animal participating in the study.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#subject
  entities__task:
    description: 'A set of structured activities performed by the participant.

      Tasks are usually accompanied by stimuli and responses, and can greatly vary
      in complexity.


      In the context of brain scanning, a task is always tied to one data acquisition.

      Therefore, even if during one acquisition the subject performed multiple conceptually
      different behaviors

      (with different sets of instructions) they will be considered one (combined)
      task.


      While tasks may be repeated across multiple acquisitions,

      a given task may have different sets of stimuli (for example, randomized order)
      and participant responses

      across subjects, sessions, and runs.


      The `task-<label>` MUST be consistent across subjects and sessions.


      Files with the `task-<label>` entity SHOULD have an associated

      [events file](SPEC_ROOT/modality-agnostic-files/events.md#events),

      as well as certain metadata fields in the associated JSON file.


      For the purpose of this specification we consider the so-called "resting state"
      a task,

      although events files are not expected for resting state data.

      Additionally, a common convention in the specification is to include the word
      "rest" in

      the `task` label for resting state files (for example, `task-rest`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#task
  entities__template:
    description: 'A standardized space of analysis specified or generated by one or
      more averages of features

      with respect to which group-level and atlas-derived results are provided.

      The `<label>` SHOULD follow the modality-specific conventions listed in the

      [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#template
  entities__tracer:
    description: 'The `trc-<label>` entity can be used to distinguish sequences using
      different tracers.


      This entity represents the `"TracerName"` metadata field.

      Therefore, if the `trc-<label>` entity is present in a filename,

      `"TracerName"` MUST be defined in the associated metadata.

      Please note that the `<label>` does not need to match the actual value of the
      field.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#tracer
  entities__tracksys:
    description: 'The `tracksys-<label>` entity can be used as a key-value pair

      to label *_motion.tsv and *_motion.json files.

      It can also be used to label *_channel.tsv or *_events.tsv files

      when they belong to a specific tracking system.


      This entity corresponds to the `"TrackingSystemName"` metadata field in a *_motion.json
      file.

      `tracksys-<label>` entity is a concise string whereas `"TrackingSystemName"`

      may be longer and more human readable.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#tracksys
  entities__volume:
    description: 'The `voi-<label>` entity can be used to distinguish acquisitions
      localized to different regions.

      The label SHOULD be the name of the body region or part scanned.

      If used, the fields `"BodyPart"` and `"BodyPartDetails"` MUST be defined in
      the JSON file.

      `BodyPartDetailsOntology` is OPTIONAL to also include.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#volume
  metadata__ACCELChannelCount:
    description: Number of acceleration channels.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ACCELChannelCount
  metadata__ANGACCELChannelCount:
    description: Number of angular acceleration channels.
    multivalued: false
    range: integer
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ANGACCELChannelCount
  metadata__Acknowledgements:
    description: 'Text acknowledging contributions of individuals or institutions
      beyond

      those listed in Authors or Funding.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Acknowledgements
  metadata__AcquisitionDuration:
    description: 'Duration (in seconds) of scan acquisition, including all volumes
      for multi-volume scans.

      Corresponds to [DICOM Tag 0018, 9073](http://www.dicomlookup.com/dicomtags/(0018,9073))

      `Acquisition Duration`.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionDuration
  metadata__AcquisitionMode:
    description: Type of acquisition of the PET data (for example, `"list mode"`).
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionMode
  metadata__AcquisitionVoxelSize:
    description: 'An array of numbers with a length of 3, in millimeters.

      This field denotes the original acquisition voxel size,

      excluding any inter-slice gaps and before any interpolation or resampling

      within reconstruction or image processing.

      Any point spread function effects, for example due to T2-blurring,

      that would decrease the effective resolution are not considered here.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AcquisitionVoxelSize
  metadata__Anaesthesia:
    description: Details of anaesthesia used, if any.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Anaesthesia
  metadata__AnalyticalApproach:
    description: 'Methodology or methodologies used to analyze the `"GeneticLevel"`.

      Values MUST be taken from the

      [database of Genotypes and Phenotypes

      (dbGaP)](https://www.ncbi.nlm.nih.gov/gap/advanced)

      under /Study/Molecular Data Type (for example, SNP Genotypes (Array) or

      Methylation (CpG).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnalyticalApproach
  metadata__AnatomicalImage:
    description: 'The path(s) to the anatomical MR image file(s), if present,

      to which the associated MRS data file corresponds.

      Contains one or more [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalImage
  metadata__AnatomicalLandmarkCoordinateSystem:
    description: 'Defines the coordinate system for the anatomical landmarks.

      See the [Coordinate Systems Appendix](SPEC_ROOT/appendices/coordinate-systems.md)

      for a list of restricted keywords for coordinate systems.

      If `"Other"`, provide definition of the coordinate system in

      `"AnatomicalLandmarkCoordinateSystemDescription"`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateSystem
  metadata__AnatomicalLandmarkCoordinateSystemDescription:
    description: 'Free-form text description of the coordinate system.

      May also include a link to a documentation page or paper describing the

      system in greater detail.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateSystemDescription
  metadata__AnatomicalLandmarkCoordinateUnits:
    description: Units of the coordinates of `"AnatomicalLandmarkCoordinateSystem"`.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinateUnits
  metadata__AnatomicalLandmarkCoordinates:
    description: 'Key-value pairs of the labels and 3-D digitized locations of anatomical
      landmarks,

      interpreted following the `"AnatomicalLandmarkCoordinateSystem"`

      (for example, `{"NAS": [12.7,21.3,13.9], "LPA": [5.2,11.3,9.6],

      "RPA": [20.2,11.3,9.1]}`.

      Each array MUST contain three numeric values corresponding to x, y, and z

      axis of the coordinate system in that exact order.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinates
  metadata__AnatomicalLandmarkCoordinates__mri:
    description: 'Key-value pairs of any number of additional anatomical landmarks
      and their

      coordinates in voxel units (where first voxel has index 0,0,0)

      relative to the associated anatomical MRI

      (for example, `{"AC": [127,119,149], "PC": [128,93,141],

      "IH": [131,114,206]}`, or `{"NAS": [127,213,139], "LPA": [52,113,96],

      "RPA": [202,113,91]}`).

      Each array MUST contain three numeric values corresponding to x, y, and z

      axis of the coordinate system in that exact order.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnatomicalLandmarkCoordinates__mri
  metadata__AnchorCoordinates:
    description: 'Coordinates of the `AnchorElectrode` in the parent (anatomical)
      coordinate system.

      This should be an array of numbers of length 3, in the units given in

      `EMGCoordinateSystemUnits` within the JSON object named in `ParentCoordinateSystem`.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnchorCoordinates
  metadata__AnchorElectrode:
    description: 'Name of the electrode in the child (device) coordinate system whose
      coordinates in

      the parent (anatomical) coordinate system are given in `AnchorCoordinates`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AnchorElectrode
  metadata__ArterialSpinLabelingType:
    description: The arterial spin labeling type.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#ArterialSpinLabelingType
  metadata__AssociatedEmptyRoom:
    description: 'One or more [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri)

      pointing to empty-room file(s) associated with the subject''s MEG recording.

      Using forward-slash separated paths relative to the dataset root is

      [DEPRECATED](SPEC_ROOT/common-principles.md#definitions).'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AssociatedEmptyRoom
  metadata__AtlasName:
    description: Name of the atlas.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AtlasName
  metadata__AtlasSampleSize:
    description: 'Number of items (typically, independent participants;

      although it could also refer to, for example, sessions)

      that were employed to create the corresponding atlas.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AtlasSampleSize
  metadata__AttenuationCorrection:
    description: 'Short description of the attenuation correction method used.

      Corresponds to [DICOM Tag 0054, 1101](http://www.dicomlookup.com/dicomtags/(0054,1101))

      `Attenuation Correction Method`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AttenuationCorrection
  metadata__AttenuationCorrectionMethodReference:
    description: Reference paper for the attenuation correction method used.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AttenuationCorrectionMethodReference
  metadata__Authors:
    description: List of contributors to the creation and/or curation of the dataset.
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#Authors
  metadata__AverageCalibrationError:
    description: Average calibration error in degrees of visual angle.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#AverageCalibrationError
  metadata__B0FieldIdentifier:
    description: 'The presence of this key states that this particular 3D or 4D image
      MAY be

      used for fieldmap estimation purposes.

      Each `"B0FieldIdentifier"` MUST be a unique string within one participant''s
      tree,

      shared only by the images meant to be used as inputs for the estimation of a

      particular instance of the *B<sub>0</sub> field* estimation.

      It is RECOMMENDED to derive this identifier from DICOM Tags, for example,

      DICOM tag 0018, 1030 `Protocol Name`, or DICOM tag 0018, 0024 `Sequence Name`

      when the former is not defined (for example, in GE devices.)'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0FieldIdentifier
  metadata__B0FieldSource:
    description: 'At least one existing `"B0FieldIdentifier"` defined by images in
      the

      participant''s tree.

      This field states the *B<sub>0</sub> field* estimation designated by the

      `"B0FieldIdentifier"` that may be used to correct the dataset for distortions

      caused by B<sub>0</sub> inhomogeneities.

      `"B0FieldSource"` and `"B0FieldIdentifier"` MAY both be present for images that

      are used to estimate their own B<sub>0</sub> field, for example, in "pepolar"

      acquisitions.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0FieldSource
  metadata__B0ShimmingTechnique:
    description: 'The technique used to shim the *B*<sub>0</sub> field (for example,
      `"Dynamic shim updating"`

      or `"FASTMAP"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B0ShimmingTechnique
  metadata__B1ShimmingTechnique:
    description: 'The technique used to shim the *B*<sub>1</sub> field (for example,
      `"Simple phase align"`

      or `"Pre-saturated TurboFLASH"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#B1ShimmingTechnique
  metadata__BIDSVersion:
    description: The version of the BIDS standard that was used.
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BIDSVersion
  metadata__BackgroundSuppression:
    description: Boolean indicating if background suppression is used.
    multivalued: false
    range: boolean
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppression
  metadata__BackgroundSuppressionNumberPulses:
    description: 'The number of background suppression pulses used.

      Note that this excludes any effect of background suppression pulses applied

      before the labeling.'
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppressionNumberPulses
  metadata__BackgroundSuppressionPulseTime:
    description: 'Array of numbers containing timing, in seconds,

      of the background suppression pulses with respect to the start of the

      labeling.

      In case of multi-PLD with different background suppression pulse times,

      only the pulse time of the first PLD should be defined.'
    multivalued: true
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BackgroundSuppressionPulseTime
  metadata__BasedOn:
    description: 'List of files in a file collection to generate the map.

      Fieldmaps are also listed, if involved in the processing.

      This field is DEPRECATED, and this metadata SHOULD be recorded in the

      `Sources` field using [BIDS URIs](SPEC_ROOT/common-principles.md#bids-uri)

      to distinguish sources from different datasets.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BasedOn
  metadata__BloodDensity:
    description: Measured blood density. Unit of blood density should be in `"g/mL"`.
    multivalued: false
    range: float
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BloodDensity
  metadata__BodyPart:
    description: 'Body part of the organ / body region scanned.

      Corresponds to [DICOM Tag 0018, 0015](http://www.dicomlookup.com/dicomtags/(0018,0015))
      `Body Part Examined`.'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPart
  metadata__BodyPartDetails:
    description: 'Additional details about body part or location (for example: `"corpus
      callosum"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPartDetails
  metadata__BodyPartDetailsOntology:
    description: '[URI](SPEC_ROOT/common-principles.md#uniform-resource-indicator)
      of ontology used for

      BodyPartDetails (for example: `"https://www.ebi.ac.uk/ols/ontologies/uberon"`).'
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#BodyPartDetailsOntology
