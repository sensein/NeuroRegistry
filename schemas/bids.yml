      '
    multivalued: false
    range: string
    slot_uri: https://bids-specification.readthedocs.io/en/stable/glossary.html#iEEGCoordinateSystemDescription
  iEEGCoordinateUnits:
    description: 'Units of the `*_electrodes.tsv`.

      MUST be `"pixels"` if `iEEGCoordinateSystem` is `Pixels`.

