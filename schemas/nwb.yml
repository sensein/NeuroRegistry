classes:
  AbstractFeatureSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#AbstractFeatureSeries
    description: Abstract features, such as quantitative descriptions of sensory stimuli.
      The TimeSeries::data field is a 2-D array, storing those features (e.g., for
      a visual grating stimulus this might be orientation, spatial frequency and contrast).
      Null stimuli (e.g., uniform gray) can be marked as being an independent feature
      (e.g., 1.0 for gray, 0.0 for actual stimulus) or by storing NaNs for feature
      values, or through use of the TimeSeries::control fields. A set of features
      is considered to persist until the next set of features is defined. The final
      set of features stored should be the null set. This is useful when storing the
      raw stimulus is impractical.
    is_a: TimeSeries
    slots:
    - AbstractFeatureSeries__data
    - AbstractFeatureSeries__feature_units
    - AbstractFeatureSeries__features
  AnnotationSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#AnnotationSeries
    description: 'DEPRECATED. Use an `EventsTable` instead, placed in the top-level
      `/events` group of the `NWBFile`. The `timestamps` field maps to the `timestamp`
      column, and the `data` field (annotation strings) maps to the `annotation` column
      on `EventsTable`. Use the `source_description` attribute on the `EventsTable`
      to record where the annotations came from (e.g., "Manual video review"). Original
      definition: Stores user annotations made during an experiment. The data[] field
      stores a text array, and timestamps are stored for each annotation (i.e., interval=1).
      This is largely an alias to a standard TimeSeries storing a text array but that
      is identifiable as storing annotations in a machine-readable way.'
    is_a: TimeSeries
    slots:
    - AnnotationSeries__data
  BehavioralEpochs:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#BehavioralEpochs
    description: TimeSeries for storing behavioral epochs. The objective of this and
      the other two Behavioral interfaces (e.g., BehavioralEvents and BehavioralTimeSeries)
      is to provide generic hooks for software tools/scripts. This allows a tool/script
      to take the output of one specific interface (e.g., UnitTimes) and plot that
      data relative to another data modality (e.g., behavioral events) without having
      to define all possible modalities in advance. Declaring one of these interfaces
      means that one or more TimeSeries of the specified type are published. These
      TimeSeries should reside in a group having the same name as the interface. For
      example, if a BehavioralTimeSeries interface is declared, the module will have
      one or more TimeSeries defined in the module sub-group 'BehavioralTimeSeries'.
      BehavioralEpochs should use IntervalSeries. BehavioralEvents is used for irregular
      events. BehavioralTimeSeries is for continuous data.
    is_a: NWBDataInterface
    slots: []
  BehavioralEvents:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#BehavioralEvents
    description: 'DEPRECATED. Use an `EventsTable` instead, placed in the top-level
      `/events` group of the `NWBFile`. Each `TimeSeries` formerly stored under `BehavioralEvents`
      becomes one `EventsTable`. The `timestamps` field maps to the `timestamp` column,
      and the `data` field maps to an additional column named after the event marker
      (e.g., `reward_magnitude`, `port_number`); for multi-dimensional `data`, use
      one column per field. Any other per-event metadata becomes additional columns.
      Use the `source_description` attribute on the `EventsTable` to record where
      the events came from (e.g., "Acquisition system", "Thresholding of analog signal
      ANALOG1 at 3 V", "Manual video review"). Original definition: TimeSeries for
      storing behavioral events. See description of BehavioralEpochs for more details.'
    is_a: NWBDataInterface
    slots: []
  BehavioralTimeSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#BehavioralTimeSeries
    description: TimeSeries for storing behavioral time series data. See description
      of BehavioralEpochs for more details.
    is_a: NWBDataInterface
    slots: []
  ClusterWaveforms:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ClusterWaveforms
    description: DEPRECATED. The mean waveform shape, including standard deviation,
      of the different clusters. Ideally, the waveform analysis should be performed
      on data that is only high-pass filtered. This is a separate module because it
      is expected to require updating. For example, IMEC probes may require different
      storage requirements to store/display mean waveforms, requiring a new interface
      or an extension of this one.
    is_a: NWBDataInterface
    slots:
    - ClusterWaveforms__waveform_filtering
    - ClusterWaveforms__waveform_mean
    - ClusterWaveforms__waveform_sd
    - ClusterWaveforms__clustering_interface
  Clustering:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Clustering
    description: DEPRECATED. Clustered spike data, whether from automatic clustering
      tools (e.g., klustakwik) or as a result of manual sorting.
    is_a: NWBDataInterface
    slots:
    - Clustering__description
    - Clustering__num
    - Clustering__peak_over_rms
    - Clustering__times
  CompassDirection:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#CompassDirection
    description: With a CompassDirection interface, a module publishes a SpatialSeries
      object representing a floating point value for theta. The SpatialSeries::reference_frame
      field should indicate what direction corresponds to 0 and which is the direction
      of rotation (this should be clockwise). The unit for the SpatialSeries should
      be radians or degrees.
    is_a: NWBDataInterface
    slots: []
  CorrectedImageStack:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#CorrectedImageStack
    description: Results from motion correction of an image stack.
    is_a: NWBDataInterface
    slots:
    - CorrectedImageStack__original
  DecompositionSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#DecompositionSeries
    description: Spectral analysis of a time series, e.g., of an LFP or a speech signal.
    is_a: TimeSeries
    slots:
    - DecompositionSeries__data
    - DecompositionSeries__metric
    - DecompositionSeries__source_channels
    - DecompositionSeries__source_timeseries
  Device:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Device
    description: Metadata about a specific instance of a data acquisition device,
      e.g., recording system, electrode, microscope. Link to a DeviceModel.model to
      represent information about the model of the device.
    is_a: NWBContainer
    slots:
    - Device__description
    - Device__manufacturer
    - Device__model_number
    - Device__model_name
    - Device__serial_number
    - Device__model
  DeviceModel:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#DeviceModel
    description: Model properties of a data acquisition device, e.g., recording system,
      electrode, microscope. This should be extended for specific types of device
      models to include additional attributes specific to each type. The name of the
      DeviceModel should be the most common representation of the model name, e.g.,
      Neuropixels 1.0, V-Probe, Bergamo III.
    is_a: NWBContainer
    slots:
    - DeviceModel__manufacturer
    - DeviceModel__model_number
    - DeviceModel__description
  DfOverF:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#DfOverF
    description: dF/F information about a region of interest (ROI). Storage hierarchy
      of dF/F should be the same as for segmentation (i.e., same names for ROIs and
      for image planes).
    is_a: NWBDataInterface
    slots: []
  ElectricalSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ElectricalSeries
    description: A time series of acquired voltage data from extracellular recordings.
      The data field is an int or float array storing data in volts. The first dimension
      should always represent time. The second dimension, if present, should represent
      channels.
    is_a: TimeSeries
    slots:
    - ElectricalSeries__filtering
    - ElectricalSeries__data
    - ElectricalSeries__electrodes
    - ElectricalSeries__channel_conversion
  ElectrodeGroup:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ElectrodeGroup
    description: A physical grouping of electrodes, e.g., a shank of an array. An
      electrode group is typically used to describe electrodes that are physically
      connected on a single device and are often (but not always) used together for
      analysis, such as for spike sorting. Note that this is descriptive metadata;
      electrodes from different groups can still be spike-sorted together if needed.
    is_a: NWBContainer
    slots:
    - ElectrodeGroup__description
    - ElectrodeGroup__location
    - ElectrodeGroup__position
    - ElectrodeGroup__device
  ElectrodesTable:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ElectrodesTable
    description: A table of all electrodes (i.e., channels) used for recording. Introduced
      in NWB 2.8.0. Replaces the "electrodes" table (neurodata_type_inc DynamicTable,
      no neurodata_type_def) that is part of NWBFile.
    is_a: DynamicTable
    slots:
    - ElectrodesTable__location
    - ElectrodesTable__group
    - ElectrodesTable__group_name
    - ElectrodesTable__x
    - ElectrodesTable__y
    - ElectrodesTable__z
    - ElectrodesTable__imp
    - ElectrodesTable__filtering
    - ElectrodesTable__rel_x
    - ElectrodesTable__rel_y
    - ElectrodesTable__rel_z
    - ElectrodesTable__reference
  EventDetection:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#EventDetection
    description: Detected spike events from voltage trace(s).
    is_a: NWBDataInterface
    slots:
    - EventDetection__detection_method
    - EventDetection__source_idx
    - EventDetection__times
    - EventDetection__source_electricalseries
  EventWaveform:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#EventWaveform
    description: DEPRECATED. Represents either the waveforms of detected events, as
      extracted from a raw data trace in /acquisition, or the event waveforms that
      were stored during experiment acquisition.
    is_a: NWBDataInterface
    slots: []
  EyeTracking:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#EyeTracking
    description: Eye-tracking data, representing direction of gaze.
    is_a: NWBDataInterface
    slots: []
  FeatureExtraction:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#FeatureExtraction
    description: Features, such as PC1 and PC2, that are extracted from signals stored
      in a SpikeEventSeries or other source.
    is_a: NWBDataInterface
    slots:
    - FeatureExtraction__description
    - FeatureExtraction__features
    - FeatureExtraction__times
    - FeatureExtraction__electrodes
  FilteredEphys:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#FilteredEphys
    description: Electrophysiology data from one or more channels that has been subjected
      to filtering. Examples of filtered data include Theta and Gamma (LFP has its
      own interface). FilteredEphys modules publish an ElectricalSeries for each filtered
      channel or set of channels. The name of each ElectricalSeries is arbitrary but
      should be informative. The source of the filtered data, whether this is from
      analysis of another time series or as acquired by hardware, should be noted
      in the TimeSeries::description field of each ElectricalSeries. There is no assumed
      1:1 correspondence between filtered ephys signals and electrodes, as a single
      signal can apply to many nearby electrodes, and one electrode may have different
      filtered (e.g., theta and/or gamma) signals represented. Filter properties should
      be noted in the ElectricalSeries 'filtering' attribute.
    is_a: NWBDataInterface
    slots: []
  Fluorescence:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Fluorescence
    description: Fluorescence information about a region of interest (ROI). Storage
      hierarchy of fluorescence should be the same as for segmentation (i.e., same
      names for ROIs and for image planes).
    is_a: NWBDataInterface
    slots: []
  FrequencyBandsTable:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#FrequencyBandsTable
    description: Table for describing the bands that DecompositionSeries was generated
      from. There should be one row in this table for each band.
    is_a: DynamicTable
    slots:
    - FrequencyBandsTable__band_name
    - FrequencyBandsTable__band_limits
    - FrequencyBandsTable__band_mean
    - FrequencyBandsTable__band_stdev
  ImageMaskSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ImageMaskSeries
    description: DEPRECATED. An alpha mask that is applied to a presented visual stimulus.
      The 'data' array contains an array of mask values that are applied to the displayed
      image. Mask values are stored as RGBA. Mask can vary with time. The timestamps
      array indicates the starting time of a mask, and that mask pattern continues
      until it is explicitly changed.
    is_a: ImageSeries
    slots:
    - ImageMaskSeries__masked_imageseries
  ImageSegmentation:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ImageSegmentation
    description: Stores pixels in an image that represent different regions of interest
      (ROIs) or masks. All segmentation for a given imaging plane is stored together,
      with storage for multiple imaging planes (masks) supported. Each ROI is stored
      in its own subgroup, with the ROI group containing both a 2-D mask and a list
      of pixels that make up this mask. Segments can also be used for masking neuropil.
      If segmentation is allowed to change with time, a new imaging plane (or module)
      is required and ROI names should remain consistent between them.
    is_a: NWBDataInterface
    slots: []
  ImageSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ImageSeries
    description: General image data that is common between acquisition and stimulus
      time series. Sometimes the image data is stored in the file in a raw format
      while other times it will be stored as a series of external image files in the
      host file system. The data field will either be binary data, if the data is
      stored in the NWB file, or empty, if the data is stored in an external image
      stack. [frame][x][y] or [frame][x][y][z].
    is_a: TimeSeries
    slots:
    - ImageSeries__data
    - ImageSeries__dimension
    - ImageSeries__external_file
    - ImageSeries__num_samples
    - ImageSeries__format
    - ImageSeries__device
  Images:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Images
    description: A collection of images with an optional way to specify the order
      of the images using the "order_of_images" dataset. An order must be specified
      if the images are referenced by index, e.g., from an IndexSeries.
    is_a: NWBDataInterface
    slots:
    - Images__description
    - Images__order_of_images
  ImagingPlane:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ImagingPlane
    description: An imaging plane and its metadata.
    is_a: NWBContainer
    slots:
    - ImagingPlane__description
    - ImagingPlane__excitation_lambda
    - ImagingPlane__imaging_rate
    - ImagingPlane__indicator
    - ImagingPlane__location
    - ImagingPlane__manifold
    - ImagingPlane__origin_coords
    - ImagingPlane__grid_spacing
    - ImagingPlane__reference_frame
    - ImagingPlane__device
  ImagingRetinotopy:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ImagingRetinotopy
    description: 'DEPRECATED. Intrinsic signal optical imaging or widefield imaging
      for measuring retinotopy. Stores orthogonal maps (e.g., altitude/azimuth; radius/theta)
      of responses to specific stimuli and a combined polarity map from which to identify
      visual areas. This group does not store the raw responses imaged during retinotopic
      mapping or the stimuli presented, but rather the resulting phase and power maps
      after applying a Fourier transform on the averaged responses. Note: for data
      consistency, all images and arrays are stored in the format [row][column] and
      [row, col], which equates to [y][x]. Field of view and dimension arrays may
      appear backward (i.e., y before x).'
    is_a: NWBDataInterface
    slots:
    - ImagingRetinotopy__axis_1_phase_map
    - ImagingRetinotopy__axis_1_power_map
    - ImagingRetinotopy__axis_2_phase_map
    - ImagingRetinotopy__axis_2_power_map
    - ImagingRetinotopy__axis_descriptions
    - ImagingRetinotopy__focal_depth_image
    - ImagingRetinotopy__sign_map
    - ImagingRetinotopy__vasculature_image
  IndexSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#IndexSeries
    description: Stores indices that reference images defined in other containers.
      The primary purpose of the IndexSeries is to allow images stored in an Images
      container to be referenced in a specific sequence through the 'indexed_images'
      link. This approach avoids duplicating image data when the same image needs
      to be presented multiple times or when images need to be shown in a different
      order than they are stored. Since images in an Images container do not have
      an inherent order, the Images container needs to include an 'order_of_images'
      dataset (of type ImageReferences) whenever it is referenced by an IndexSeries.
      This dataset establishes the ordered sequence that the indices in IndexSeries
      refer to. The 'data' field stores the index into this ordered sequence, and
      the 'timestamps' array indicates the precise presentation time of each indexed
      image during an experiment. This can be used for displaying individual images
      or creating movie segments by referencing a sequence of images with the appropriate
      timestamps. While IndexSeries can also reference frames from an ImageSeries
      through the 'indexed_timeseries' link, this usage is discouraged and will be
      deprecated in favor of using Images containers with 'order_of_images'.
    is_a: TimeSeries
    slots:
    - IndexSeries__data
    - IndexSeries__indexed_timeseries
    - IndexSeries__indexed_images
  IntervalSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#IntervalSeries
    description: Stores intervals of data. The timestamps field stores the beginning
      and end of intervals. The data field stores whether the interval just started
      (>0 value) or ended (<0 value). Different interval types can be represented
      in the same series by using multiple key values (e.g., 1 for feature A, 2 for
      feature B, 3 for feature C, etc.). The field data stores an 8-bit integer. This
      is largely an alias of a standard TimeSeries but that is identifiable as representing
      time intervals in a machine-readable way.
    is_a: TimeSeries
    slots:
    - IntervalSeries__data
  LFP:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#LFP
    description: LFP data from one or more channels. The electrode map in each published
      ElectricalSeries will identify which channels are providing LFP data. Filter
      properties should be noted in the ElectricalSeries 'filtering' attribute.
    is_a: NWBDataInterface
    slots: []
  LabMetaData:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#LabMetaData
    description: Lab-specific meta-data.
    is_a: NWBContainer
    slots: []
  MotionCorrection:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#MotionCorrection
    description: 'An image stack where all frames are shifted (registered) to a common
      coordinate system, to account for movement and drift between frames. Note: each
      frame at each point in time is assumed to be 2-D (has only x and y dimensions).'
    is_a: NWBDataInterface
    slots: []
  NWBContainer:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#NWBContainer
    description: An abstract data type for a generic container storing collections
      of data and metadata. Base type for all data and metadata containers.
    is_a: Container
    slots: []
  NWBDataInterface:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#NWBDataInterface
    description: An abstract data type for a generic container storing collections
      of data, as opposed to metadata.
    is_a: NWBContainer
    slots: []
  NWBFile:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#NWBFile
    description: An NWB file storing cellular-based neurophysiology data from a single
      experimental session.
    is_a: NWBContainer
    slots:
    - NWBFile__nwb_version
    - NWBFile__file_create_date
    - NWBFile__identifier
    - NWBFile__session_description
    - NWBFile__session_start_time
    - NWBFile__timestamps_reference_time
  OnePhotonSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#OnePhotonSeries
    description: Image stack recorded over time from 1-photon microscope.
    is_a: ImageSeries
    slots:
    - OnePhotonSeries__pmt_gain
    - OnePhotonSeries__scan_line_rate
    - OnePhotonSeries__exposure_time
    - OnePhotonSeries__binning
    - OnePhotonSeries__power
    - OnePhotonSeries__intensity
    - OnePhotonSeries__data
    - OnePhotonSeries__imaging_plane
  OpticalChannel:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#OpticalChannel
    description: An optical channel used to record from an imaging plane.
    is_a: NWBContainer
    slots:
    - OpticalChannel__description
    - OpticalChannel__emission_lambda
  OpticalSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#OpticalSeries
    description: Image data that is presented or recorded. A stimulus template movie
      will be stored only as an image. When the image is presented as stimulus, additional
      data is required, such as field of view (e.g., how much of the visual field
      the image covers, or how large the imaged area of the target is). If the OpticalSeries
      represents acquired imaging data, orientation is also important.
    is_a: ImageSeries
    slots:
    - OpticalSeries__distance
    - OpticalSeries__field_of_view
    - OpticalSeries__data
    - OpticalSeries__orientation
  OptogeneticSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#OptogeneticSeries
    description: An optogenetic stimulus.
    is_a: TimeSeries
    slots:
    - OptogeneticSeries__data
    - OptogeneticSeries__site
  OptogeneticStimulusSite:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#OptogeneticStimulusSite
    description: A site of optogenetic stimulation.
    is_a: NWBContainer
    slots:
    - OptogeneticStimulusSite__description
    - OptogeneticStimulusSite__excitation_lambda
    - OptogeneticStimulusSite__location
    - OptogeneticStimulusSite__device
  PlaneSegmentation:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#PlaneSegmentation
    description: Results from image segmentation of a specific imaging plane. At least
      one of `image_mask`, `pixel_mask`, or `voxel_mask` is required.
    is_a: DynamicTable
    slots:
    - PlaneSegmentation__image_mask
    - PlaneSegmentation__pixel_mask_index
    - PlaneSegmentation__pixel_mask
    - PlaneSegmentation__voxel_mask_index
    - PlaneSegmentation__voxel_mask
    - PlaneSegmentation__imaging_plane
  Position:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Position
    description: Position data, whether along the x, x/y, or x/y/z axes.
    is_a: NWBDataInterface
    slots: []
  ProcessingModule:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#ProcessingModule
    description: A collection of processed data.
    is_a: NWBContainer
    slots:
    - ProcessingModule__description
  PupilTracking:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#PupilTracking
    description: Eye-tracking data, representing pupil size.
    is_a: NWBDataInterface
    slots: []
  RoiResponseSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#RoiResponseSeries
    description: ROI responses over an imaging plane. The first dimension represents
      time. The second dimension, if present, represents ROIs.
    is_a: TimeSeries
    slots:
    - RoiResponseSeries__data
    - RoiResponseSeries__rois
  SpatialSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#SpatialSeries
    description: 'Direction, e.g., of gaze or travel, or position. The TimeSeries::data
      field is a 2-D array storing position or direction relative to some reference
      frame. Array structure: [num measurements] [num dimensions]. Each SpatialSeries
      has a text dataset reference_frame that indicates the zero-position, or the
      zero-axes for direction. For example, if representing gaze direction, ''straight-ahead''
      might be a specific pixel on the monitor, or some other point in space. For
      position data, the 0,0 point might be the top-left corner of an enclosure, as
      viewed from the tracking camera. The unit of data will indicate how to interpret
      SpatialSeries values.'
    is_a: TimeSeries
    slots:
    - SpatialSeries__data
    - SpatialSeries__reference_frame
  SpikeEventSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#SpikeEventSeries
    description: 'Stores snapshots/snippets of recorded spike events (i.e., threshold
      crossings). This may also be raw data, as reported by ephys hardware. If so,
      the TimeSeries::description field should describe how events were detected.
      All events span the same recording channels and store snapshots of equal duration.
      TimeSeries::data array structure: [num events] [num channels] [num samples]
      (or [num events] [num samples] for single electrode).'
    is_a: ElectricalSeries
    slots:
    - SpikeEventSeries__data
    - SpikeEventSeries__timestamps
  Subject:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Subject
    description: Information about the animal or person from which the data was measured.
    is_a: NWBContainer
    slots:
    - Subject__age
    - Subject__date_of_birth
    - Subject__description
    - Subject__genotype
    - Subject__sex
    - Subject__species
    - Subject__strain
    - Subject__subject_id
    - Subject__weight
  TimeSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#TimeSeries
    description: General purpose time series.
    is_a: NWBDataInterface
    slots:
    - TimeSeries__description
    - TimeSeries__comments
    - TimeSeries__data
    - TimeSeries__starting_time
    - TimeSeries__timestamps
    - TimeSeries__control
    - TimeSeries__control_description
  TwoPhotonSeries:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#TwoPhotonSeries
    description: Image stack recorded over time from 2-photon microscope.
    is_a: ImageSeries
    slots:
    - TwoPhotonSeries__pmt_gain
    - TwoPhotonSeries__scan_line_rate
    - TwoPhotonSeries__data
    - TwoPhotonSeries__field_of_view
    - TwoPhotonSeries__imaging_plane
  Units:
    class_uri: https://nwb-schema.readthedocs.io/en/latest/#Units
    description: Data about spiking units. Event times of observed units (e.g., cell,
      synapse, etc.) should be concatenated and stored in spike_times.
    is_a: DynamicTable
    slots:
    - Units__spike_times_index
    - Units__spike_times
    - Units__obs_intervals_index
    - Units__obs_intervals
    - Units__electrodes_index
    - Units__electrodes
    - Units__electrode_group
    - Units__waveform_mean
    - Units__waveform_sd
    - Units__waveforms
    - Units__waveforms_index
    - Units__waveforms_index_index
default_prefix: nwb
default_range: string
description: Neurodata Without Borders (NWB) format specification.
id: https://nwb-schema.readthedocs.io/en/latest/
imports:
- linkml:types
license: BSD-3-Clause
name: nwb
prefixes:
  linkml: https://w3id.org/linkml/
  nwb: https://nwb-schema.readthedocs.io/en/latest/
  xsd: http://www.w3.org/2001/XMLSchema#
slots:
  AbstractFeatureSeries__data:
    description: Values of each feature at each time.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
  AbstractFeatureSeries__feature_units:
    description: Units of each feature.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#feature_units
  AbstractFeatureSeries__features:
    description: Description of the features represented in TimeSeries::data.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#features
  AnnotationSeries__data:
    description: Annotations made during an experiment.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
  ClusterWaveforms__clustering_interface:
    description: Link to Clustering interface that was the source of the clustered
      data.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#clustering_interface
  ClusterWaveforms__waveform_filtering:
    description: Filtering applied to data before generating mean/sd
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#waveform_filtering
  ClusterWaveforms__waveform_mean:
    description: The mean waveform for each cluster, using the same indices for each
      wave as cluster numbers in the associated Clustering module (i.e., cluster 3
      is in array slot [3]). Waveforms corresponding to gaps in cluster sequence should
      be empty (e.g., zero-filled).
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#waveform_mean
  ClusterWaveforms__waveform_sd:
    description: Stdev of waveforms for each cluster, using the same indices as in
      mean.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#waveform_sd
  Clustering__description:
    description: Description of clusters or clustering (e.g., cluster 0 is noise,
      clusters curated using Klusters, etc.).
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  Clustering__num:
    description: Cluster number of each event
    multivalued: false
    range: integer
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#num
  Clustering__peak_over_rms:
    description: Maximum ratio of waveform peak to RMS on any channel in the cluster
      (provides a basic clustering metric).
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#peak_over_rms
  Clustering__times:
    description: Times of clustered events, in seconds. This may be a link to times
      field in associated FeatureExtraction module.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#times
  CorrectedImageStack__original:
    description: Link to ImageSeries object that is being registered.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#original
  DecompositionSeries__data:
    description: Data decomposed into frequency bands.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
  DecompositionSeries__metric:
    description: The metric used, e.g., phase, amplitude, power.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#metric
  DecompositionSeries__source_channels:
    description: DynamicTableRegion pointer to the channels that this decomposition
      series was generated from.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#source_channels
  DecompositionSeries__source_timeseries:
    description: Link to TimeSeries object that this data was calculated from. Metadata
      about electrodes and their position can be read from that ElectricalSeries so
      it is not necessary to store that information here.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#source_timeseries
  DeviceModel__description:
    description: Description of the device model as free-form text.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  DeviceModel__manufacturer:
    description: The name of the manufacturer of the device model, e.g., Imec, Plexon,
      Thorlabs.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#manufacturer
  DeviceModel__model_number:
    description: The model number (or part/product number) of the device, e.g., PRB_1_4_0480_1,
      PLX-VP-32-15SE(75)-(260-80)(460-10)-300-(1)CON/32m-V, BERGAMO.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#model_number
  Device__description:
    description: Description of the device as free-form text. If there is any software/firmware
      associated with the device, the names and versions of those can be added to
      NWBFile.was_generated_by.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  Device__manufacturer:
    description: DEPRECATED. The name of the manufacturer of the device, e.g., Imec,
      Plexon, Thorlabs. Instead of using this field, store the value in DeviceModel.manufacturer
      and link to that DeviceModel from this Device.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#manufacturer
  Device__model:
    description: The model of the device.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#model
  Device__model_name:
    description: DEPRECATED. The model name of the device, e.g., Neuropixels 1.0,
      V-Probe, Bergamo III. Instead of using this field, create and add a new DeviceModel
      named the model name and link to that DeviceModel from this Device.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#model_name
  Device__model_number:
    description: DEPRECATED. The model number (or part/product number) of the device,
      e.g., PRB_1_4_0480_1, PLX-VP-32-15SE(75)-(260-80)(460-10)-300-(1)CON/32m-V,
      BERGAMO. Instead of using this field, store the value in DeviceModel.model_number
      and link to that DeviceModel from this Device.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#model_number
  Device__serial_number:
    description: The serial number of the device.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#serial_number
  ElectricalSeries__channel_conversion:
    description: Channel-specific conversion factor. Multiply the data in the 'data'
      dataset by these values along the channel axis (as indicated by axis attribute)
      AND by the global conversion factor in the 'conversion' attribute of 'data'
      to get the data values in Volts, i.e., data in Volts = data * data.conversion
      * channel_conversion. This approach allows for both global and per-channel data
      conversion factors needed to support the storage of electrical recordings as
      native values generated by data acquisition systems. If this dataset is not
      present, then there is no channel-specific conversion factor, i.e., it is 1
      for all channels.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#channel_conversion
  ElectricalSeries__data:
    description: Recorded voltage data.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
  ElectricalSeries__electrodes:
    description: DynamicTableRegion pointer to the electrodes that this time series
      was generated from.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#electrodes
  ElectricalSeries__filtering:
    description: Filtering applied to all channels of the data. For example, if this
      ElectricalSeries represents high-pass-filtered data (also known as AP Band),
      then this value could be "High-pass 4-pole Bessel filter at 500 Hz". If this
      ElectricalSeries represents low-pass-filtered LFP data and the type of filter
      is unknown, then this value could be "Low-pass filter at 300 Hz". If a non-standard
      filter type is used, provide as much detail about the filter properties as possible.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#filtering
  ElectrodeGroup__description:
    description: Description of this electrode group.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  ElectrodeGroup__device:
    description: Link to the device that was used to record from this electrode group.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#device
  ElectrodeGroup__location:
    description: Location of electrode group. Specify the area, layer, comments on
      estimation of area/layer, etc. Use standard atlas names for anatomical regions
      when possible.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#location
  ElectrodeGroup__position:
    description: Stereotaxic or common framework coordinates of the electrode group
      position.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#position
  ElectrodesTable__filtering:
    description: Description of hardware filtering, including the filter name and
      frequency cutoffs.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#filtering
  ElectrodesTable__group:
    description: Reference to the ElectrodeGroup this electrode is a part of.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#group
  ElectrodesTable__group_name:
    description: Name of the ElectrodeGroup this electrode is a part of.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#group_name
  ElectrodesTable__imp:
    description: Impedance of the channel, in ohms.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#imp
  ElectrodesTable__location:
    description: Location of the electrode (channel). Specify the area, layer, comments
      on estimation of area/layer, stereotaxic coordinates if in vivo, etc. Use standard
      atlas names for anatomical regions when possible.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#location
  ElectrodesTable__reference:
    description: Description of the reference electrode and/or reference scheme used
      for this electrode, e.g., "stainless steel skull screw" or "online common average
      referencing".
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#reference
  ElectrodesTable__rel_x:
    description: x coordinate in electrode group. Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#rel_x
  ElectrodesTable__rel_y:
    description: y coordinate in electrode group. Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#rel_y
  ElectrodesTable__rel_z:
    description: z coordinate in electrode group. Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#rel_z
  ElectrodesTable__x:
    description: x coordinate of the channel location in the brain (+x is posterior).
      Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#x
  ElectrodesTable__y:
    description: y coordinate of the channel location in the brain (+y is inferior).
      Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#y
  ElectrodesTable__z:
    description: z coordinate of the channel location in the brain (+z is right).
      Units should be specified in microns.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#z
  EventDetection__detection_method:
    description: Description of how events were detected, such as voltage threshold,
      or dV/dT threshold, as well as relevant values.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#detection_method
  EventDetection__source_electricalseries:
    description: Link to the ElectricalSeries that this data was calculated from.
      Metadata about electrodes and their position can be read from that ElectricalSeries
      so it is not necessary to include that information here.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#source_electricalseries
  EventDetection__source_idx:
    description: Indices (zero-based) into the linked source ElectricalSeries::data
      array corresponding to the time of each event, or the time and channel of each
      event. ''description'' should define what is meant by time of event (e.g., .25
      ms before action potential peak, zero-crossing time, etc.). The index points
      to each event from the raw data.
    multivalued: false
    range: integer
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#source_idx
  EventDetection__times:
    description: DEPRECATED. Timestamps of events, in seconds.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#times
  FeatureExtraction__description:
    description: Description of features (e.g., ''PC1'') for each of the extracted
      features.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  FeatureExtraction__electrodes:
    description: DynamicTableRegion pointer to the electrodes that this time series
      was generated from.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#electrodes
  FeatureExtraction__features:
    description: Multi-dimensional array of features extracted from each event.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#features
  FeatureExtraction__times:
    description: Times of events that features correspond to (can be a link).
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#times
  FrequencyBandsTable__band_limits:
    description: Low and high limit of each band in Hz. If it is a Gaussian filter,
      use 2 SD on either side of the center.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#band_limits
  FrequencyBandsTable__band_mean:
    description: The center frequency (mean) of each Gaussian filter, in Hz.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#band_mean
  FrequencyBandsTable__band_name:
    description: Name of the band, e.g., theta.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#band_name
  FrequencyBandsTable__band_stdev:
    description: The standard deviation (bandwidth) of each Gaussian filter, in Hz.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#band_stdev
  ImageMaskSeries__masked_imageseries:
    description: Link to ImageSeries object that this image mask is applied to.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#masked_imageseries
  ImageSeries__data:
    description: Binary data representing images across frames. If data are stored
      in an external file, this should be an empty 3-D array.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
  ImageSeries__device:
    description: Link to the Device object that was used to capture these images.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#device
  ImageSeries__dimension:
    description: Number of pixels on x, y, (and z) axes.
    multivalued: false
    range: integer
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#dimension
  ImageSeries__external_file:
    description: Paths to one or more external file(s). The field is only present
      if format='external'. This is only relevant if the image series is stored in
      the file system as one or more image file(s). This field should NOT be used
      if the image is stored in another NWB file and that file is linked to this file.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#external_file
  ImageSeries__format:
    description: Format of image. If this is 'external', then the attribute 'external_file'
      contains the path information to the image files. If this is 'raw', then the
      raw (single-channel) binary data is stored in the 'data' dataset. If this attribute
      is not present, then the default format='raw' case is assumed.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#format
  ImageSeries__num_samples:
    description: Total number of frames across all external files. This is required
      when format='external' and timing is described using starting_time and rate,
      since data is empty and its first dimension cannot be used to determine the
      number of frames. When timestamps is provided, len(timestamps) already serves
      this purpose.
    multivalued: false
    range: integer
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#num_samples
  Images__description:
    description: Description of this collection of images.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  Images__order_of_images:
    description: Ordered dataset of references to BaseImage objects stored in the
      parent group. Each object in the Images group should be stored once and only
      once, so the dataset should have the same length as the number of images.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#order_of_images
  ImagingPlane__description:
    description: Description of the imaging plane.
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#description
  ImagingPlane__device:
    description: Link to the Device object (e.g., microscope) used to acquire images
      from this imaging plane.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#device
  ImagingPlane__excitation_lambda:
    description: Excitation wavelength, in nm.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#excitation_lambda
  ImagingPlane__grid_spacing:
    description: Space between pixels in (x, y) or voxels in (x, y, z) directions,
      in the specified unit. Assumes imaging plane is a regular grid. See also reference_frame
      to interpret the grid.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#grid_spacing
  ImagingPlane__imaging_rate:
    description: Rate that images are acquired, in Hz. If the corresponding TimeSeries
      is present, the rate should be stored there instead.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#imaging_rate
  ImagingPlane__indicator:
    description: Calcium indicator.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#indicator
  ImagingPlane__location:
    description: Location of the imaging plane. Specify the area, layer, comments
      on estimation of area/layer, stereotaxic coordinates if in vivo, etc. Use standard
      atlas names for anatomical regions when possible.
    multivalued: false
    range: string
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#location
  ImagingPlane__manifold:
    description: DEPRECATED. Physical position of each pixel. 'xyz' represents the
      position of the pixel relative to the defined coordinate space. Deprecated in
      favor of origin_coords and grid_spacing.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#manifold
  ImagingPlane__origin_coords:
    description: Physical location of the first element of the imaging plane (0, 0)
      for 2-D data or (0, 0, 0) for 3-D data. See also reference_frame for what the
      physical location is relative to (e.g., bregma).
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#origin_coords
  ImagingPlane__reference_frame:
    description: Describes reference frame of origin_coords and grid_spacing. For
      example, this can be a text description of the anatomical location and orientation
      of the grid defined by origin_coords and grid_spacing or the vectors needed
      to transform or rotate the grid to a common anatomical axis (e.g., AP/DV/ML).
      This field is necessary to interpret origin_coords and grid_spacing. If origin_coords
      and grid_spacing are not present, then this field is not required. For example,
      if the microscope takes 10 x 10 x 2 images, where the first value of the data
      matrix (index (0, 0, 0)) corresponds to (-1.2, -0.6, -2) mm relative to bregma,
      the spacing between pixels is 0.2 mm in x, 0.2 mm in y and 0.5 mm in z, and
      larger numbers in x mean more anterior, larger numbers in y mean more rightward,
      and larger numbers in z mean more ventral, then enter the following -- origin_coords
      = (-1.2, -0.6, -2) grid_spacing = (0.2, 0.2, 0.5) reference_frame = "Origin
      coordinates are relative to bregma. First dimension corresponds to anterior-posterior
      axis (larger index = more anterior). Second dimension corresponds to medial-lateral
      axis (larger index = more rightward). Third dimension corresponds to dorsal-ventral
      axis (larger index = more ventral)."
    multivalued: false
    range: string
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#reference_frame
  ImagingRetinotopy__axis_1_phase_map:
    description: Phase response to stimulus on the first measured axis.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#axis_1_phase_map
  ImagingRetinotopy__axis_1_power_map:
    description: Power response on the first measured axis. Response is scaled so
      0.0 is no power in the response and 1.0 is maximum relative power.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#axis_1_power_map
  ImagingRetinotopy__axis_2_phase_map:
    description: Phase response to stimulus on the second measured axis.
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#axis_2_phase_map
  ImagingRetinotopy__axis_2_power_map:
    description: Power response on the second measured axis. Response is scaled so
      0.0 is no power in the response and 1.0 is maximum relative power.
    multivalued: false
    range: float
    required: false
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#axis_2_power_map
  ImagingRetinotopy__axis_descriptions:
    description: Two-element array describing the contents of the two response axis
      fields. Description should be something like ['altitude', 'azimuth'] or ['radius',
      'theta'].
    multivalued: false
    range: string
    required: true
