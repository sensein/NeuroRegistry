  OnePhotonSeries__data:
    description: "Time-series of microscopy data indexed as data[time, width, height].\n\
      \nIndexing convention:\n  - width: first spatial axis (horizontal direction,\
      \ columns)\n  - height: second spatial axis (vertical direction, rows)\n\nFor\
      \ raster-scanning systems (two-photon, confocal, one-photon laser scanning):\n\
      \  - width: fast scan direction (horizontal)\n  - height: slow scan direction\
      \ (vertical)\n\nCoordinate system diagram::\n\n  height  ^\n  (slow)  |\n  \
      \        |    +-----------------+\n          |    |                 |\n    \
      \      |    |   Image plane   |\n          |    |                 |\n      \
      \    |    +-----------------+\n          |\n          0 ---------------------->\
      \ width (fast)\n\n\nFor non-raster systems (wide-field, light-sheet, random-access),\
      \ width and height\nare arbitrary coordinates of the image plane.\n\nNote: This\
      \ indexing convention conflicts with standard matrix[row, column] notation\n\
      for array access where the first index moves vertically through rows and the\
      \ second moves horizontally\nthrough columns. In the schema, data[time, width,\
      \ height] means that the first spatial\nindex moves horizontally (width) through\
      \ columns and the second spatial index moves\nvertically (height) through rows.\
      \ In summary, incrementing the first spatial index\nmoves you horizontally across\
      \ the image, while in matrix notation it would move you\nvertically across the\
      \ rows of the image.\n"
    multivalued: false
    range: float
    required: true
    slot_uri: https://nwb-schema.readthedocs.io/en/latest/#data
